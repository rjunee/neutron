name: ci

# Public Neutron Open CI (test-port tranche 1, 2026-06-15).
# Runs on every PR + push to main. The job order is a gate chain: deps must
# install before tsc (the @neutronai/* workspace symlinks resolve locally — a
# bare checkout would report phantom TS2307s), then a bounded-memory partitioned
# test run, then the self-contained leak-gate purity subset that fails the build
# if multi-instance vocabulary or a Managed module ever regresses into the tree.

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref to save runner minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9 # pin to the carve's bun (run-tests.sh discovery semantics)

      # Install BEFORE tsc so the @neutronai/* workspace symlinks exist; the
      # carved bun.lock is authoritative and Managed-name-free (carve gate 2).
      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck (tsc --noEmit)
        run: bunx tsc --noEmit

      - name: Test (bounded-memory partitioned runner)
        run: bash scripts/run-tests.sh

      - name: Purity gate (leak-gate subset)
        run: bash scripts/ci/leak-gate.sh --tree .
