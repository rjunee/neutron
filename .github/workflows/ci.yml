name: ci

# Public Neutron Open CI (test-port tranche 1, 2026-06-15).
# Runs on every PR + push to main. The job order is a gate chain: deps must
# install before tsc (the @neutronai/* workspace symlinks resolve locally — a
# bare checkout would report phantom TS2307s), then a bounded-memory partitioned
# test run, then the self-contained leak-gate purity subset that fails the build
# if multi-instance vocabulary or a Managed module ever regresses into the tree.

# `pull_request` (no `branches`/`types` filter) fires the `test` job for EVERY
# PR — opened, synchronize, reopened — to any base, so a PR to main can never
# merge without a `test` signal regardless of head-branch name shape (#321).
on:
  pull_request:
  push:
    branches: [main]

# Least-privilege default token: this workflow only reads the checkout, runs
# typecheck + tests, and grants no write scopes (fixes the CodeQL alert
# actions/missing-workflow-permissions).
permissions:
  contents: read

# Cancel superseded runs to save runner minutes. Key PR runs on the PR NUMBER
# (always slash-free) and push runs on the ref, namespaced by workflow. The
# previous `ci-${{ github.ref }}` group keyed PR runs on a ref that, for some
# branch-name shapes (e.g. a slashed `feat/...` head), could let the `test` job
# be superseded/skipped so a PR merged with only CodeQL signal (#321). The
# `github.event.pull_request.number || github.ref` form is GitHub's documented
# pattern and guarantees every PR to main gets its own independent `test` run.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9 # pin to the carve's bun (run-tests.sh discovery semantics)

      # Install BEFORE tsc so the @neutronai/* workspace symlinks exist; the
      # carved bun.lock is authoritative and Managed-name-free (carve gate 2).
      - name: Install dependencies
        run: bun install --frozen-lockfile

      # G5 — typecheck completeness. Runs `tsc -p` for EVERY tsconfig.json in the
      # repo (root deploy-gate config + every leaf/package config), not just the
      # root config. The root include list never reached trident/, app/,
      # work-board/, project-credentials/, jwt-validator/, landing/chat-react/,
      # or their test files, so real type errors used to ship. Discovery is
      # dynamic, so a new package with a tsconfig is covered automatically;
      # scripts/ci/ci-workflow.test.ts guards that completeness.
      - name: Typecheck (tsc matrix over every tsconfig)
        run: bash scripts/ci/typecheck-all.sh

      - name: Test (bounded-memory partitioned runner)
        # OOM mitigation: #193 tipped a general chunk past the 7 GB ubuntu-latest
        # ceiling (silent SIGKILL, no assertion). Halve peak RSS = concurrency 4→2
        # + chunk 100→75. TEMPORARY — raise these (and set NEUTRON_TEST_JOBS>1 for
        # parallel speed) once the larger CI runner is provisioned.
        env:
          NEUTRON_TEST_CONCURRENCY: "2"
          NEUTRON_TEST_CHUNK_SIZE: "75"
        run: bash scripts/run-tests.sh

      - name: Purity gate (leak-gate subset)
        run: bash scripts/ci/leak-gate.sh --tree .

      # G4 — layering ratchet. dependency-cruiser enforces the five-band model
      # from docs/research/refactor-audit-2026-07-02/critic-layering.md
      # (contracts < platform < services < product < composition) against
      # .dependency-cruiser.cjs. Today's ~21 known cross-band edges are
      # grandfathered in .dependency-cruiser-known-violations.json so this
      # gate does not block on day one; it fails on any NEW cross-band import
      # or import cycle, and the baseline shrinks (never grows) as the
      # audit's cut-list PRs land. Runs in single-digit seconds (parses
      # imports, doesn't typecheck).
      - name: Layering gate (dependency-cruiser)
        run: bash scripts/ci/depcruise.sh
