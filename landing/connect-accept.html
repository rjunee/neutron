<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Neutron Connect — join a shared project</title>
<meta name="description" content="Review where this shared project lives, then join." />
<meta name="robots" content="noindex" />
<link rel="icon" type="image/png" href="/favicon.png" />
<style>
  :root {
    --bg: #0e0f12;
    --surface: #15171c;
    --surface-2: #1a1c22;
    --fg: #e9eaee;
    --muted: #9aa0aa;
    --faint: #6f7681;
    --accent: #6cf;
    --border: #232630;
    --error: #ff6b6b;
    --success: #5dd39e;
    /* Write-scope caution — a warm amber, deliberately off the cool accent so it
       reads as a caution, not a brand flourish. Reserved for the ONE conditional,
       higher-stakes warning (write access), never the always-on trust lead-in. */
    --warn: #f2b25c;
    --warn-bg: #2a2113;
    --warn-border: #4a3a18;
    --space-xs: 4px; --space-sm: 8px; --space-md: 12px;
    --space-lg: 16px; --space-xl: 24px; --space-2xl: 36px;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg); }
  body {
    font: 16px/1.6 ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
    min-height: 100vh; display: grid; place-items: start center; padding: clamp(20px, 6vw, 56px) 20px;
  }
  main { max-width: 540px; width: 100%; }
  .logo {
    font: 600 14px/1.1 ui-sans-serif, system-ui;
    letter-spacing: 1.5px; text-transform: uppercase; color: var(--faint);
    margin-bottom: var(--space-2xl);
  }
  h1 {
    font: 650 30px/1.18 ui-sans-serif, system-ui;
    letter-spacing: -0.4px; margin: 0 0 var(--space-sm);
  }
  p.lede { color: var(--muted); margin: 0 0 var(--space-2xl); font-size: 16px; max-width: 46ch; }

  /* Reveal-on-load, reduced-motion-safe. */
  .reveal { opacity: 0; transform: translateY(8px); animation: rise 480ms cubic-bezier(0.2, 0.7, 0.2, 1) forwards; }
  .reveal:nth-child(2) { animation-delay: 60ms; }
  .reveal:nth-child(3) { animation-delay: 120ms; }
  @keyframes rise { to { opacity: 1; transform: none; } }
  @media (prefers-reduced-motion: reduce) { .reveal { animation: none; opacity: 1; transform: none; } }

  /* Disclosure (the load-bearing surface). */
  #disclosure { display: grid; gap: var(--space-lg); margin-bottom: var(--space-xl); }
  /* Always-on trust lead-in — calm but firm. A quiet surface card, NOT the amber
     alert: shown to every collaborator, so an alarm treatment would only train
     people to ignore it. The visual weight is carried by the conditional
     write-scope caution below, where the stakes actually vary. */
  .disclosure-trust {
    background: var(--surface-2); border: 1px solid var(--border);
    border-radius: 12px; padding: var(--space-md) var(--space-lg);
  }
  .disclosure-trust__lede { margin: 0 0 var(--space-xs); font-weight: 600; font-size: 15px; color: var(--fg); }
  .disclosure-trust__body { margin: 0; color: var(--muted); font-size: 14px; max-width: 60ch; }

  .disclosure-facts {
    display: grid; grid-template-columns: minmax(90px, max-content) 1fr;
    gap: var(--space-sm) var(--space-lg); margin: 0;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: var(--space-lg);
  }
  .disclosure-facts__term {
    color: var(--faint); font-size: 11.5px; letter-spacing: 0.6px;
    text-transform: uppercase; font-weight: 600; padding-top: 2px;
  }
  .disclosure-facts__val { margin: 0; color: var(--fg); font-size: 14.5px; }

  /* Write-scope caution — the ONE conditional, higher-stakes warning, so it
     carries the warm-amber weight. Read access gets the quiet muted line below. */
  .disclosure-write {
    background: var(--warn-bg); border: 1px solid var(--warn-border);
    border-radius: 12px; padding: var(--space-md) var(--space-lg);
  }
  .disclosure-write__lede { margin: 0 0 var(--space-xs); font-weight: 600; font-size: 14.5px; color: var(--warn); }
  .disclosure-write__body { margin: 0; color: var(--muted); font-size: 14px; max-width: 60ch; }
  .disclosure-read { margin: 0; color: var(--muted); font-size: 14px; }

  .disclosure-ack {
    display: flex; gap: var(--space-md); align-items: flex-start; cursor: pointer;
    padding: var(--space-sm) 0; color: var(--fg); font-size: 14.5px;
  }
  .disclosure-ack__box {
    appearance: none; width: 20px; height: 20px; margin: 1px 0 0; flex: 0 0 auto;
    border: 1.5px solid var(--faint); border-radius: 6px; background: var(--surface);
    cursor: pointer; display: grid; place-content: center; transition: border-color 120ms ease, background 120ms ease;
  }
  .disclosure-ack__box:checked { background: var(--accent); border-color: var(--accent); }
  .disclosure-ack__box:checked::after { content: "✓"; color: #0b1014; font-size: 13px; font-weight: 700; }
  .disclosure-ack__box:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  /* Form. */
  .fields { display: grid; gap: var(--space-lg); margin-bottom: var(--space-xl); }
  .field { display: grid; gap: 6px; }
  .field label { font-size: 12px; letter-spacing: 0.5px; text-transform: uppercase; color: var(--faint); font-weight: 600; }
  .field input {
    width: 100%; padding: 12px 14px; border-radius: 10px;
    background: var(--surface); color: var(--fg); border: 1px solid var(--border);
    font: 15px/1.4 ui-sans-serif, system-ui; transition: border-color 120ms ease;
  }
  .field input:focus { outline: none; border-color: var(--accent); }
  .field input::placeholder { color: var(--faint); }

  button.btn {
    display: block; width: 100%; padding: 14px 18px; border-radius: 12px;
    font: 600 15px/1.2 ui-sans-serif, system-ui; cursor: pointer;
    background: var(--accent); color: #0b1014; border: 1px solid var(--accent);
    transition: transform 80ms ease, opacity 120ms ease;
  }
  button.btn:active { transform: translateY(1px); }
  button.btn[disabled] { opacity: 0.4; cursor: not-allowed; }
  #status { margin-top: var(--space-lg); min-height: 1.4em; font-size: 14px; }
  #status.error { color: var(--error); }
  #status.success { color: var(--success); }
  small { color: var(--faint); display: block; margin-top: var(--space-xl); font-size: 12.5px; }
  small a { color: var(--muted); }
</style>
</head>
<body>
<main>
  <div class="logo">Neutron Connect</div>
  <h1 id="title" class="reveal">Join a shared project</h1>
  <p class="lede reveal" id="lede">Review where this project lives before you join.</p>

  <div id="disclosure" class="reveal" aria-live="polite"></div>

  <div class="fields">
    <div class="field">
      <label for="display-name">Your name</label>
      <input id="display-name" type="text" autocomplete="name" maxlength="80" placeholder="How you’ll appear in the project" />
    </div>
    <div class="field">
      <label for="guest-handle">Your handle</label>
      <input id="guest-handle" type="text" autocomplete="off" maxlength="253" placeholder="e.g. your domain or org" />
    </div>
  </div>

  <button class="btn" id="btn-accept" type="button" disabled>Join project</button>
  <div id="status" role="status" aria-live="polite"></div>
  <small>By joining you agree to the <a href="/terms">Terms</a> and <a href="/privacy">Privacy</a>.</small>
</main>
<script type="module" src="/connect/accept.js"></script>
</body>
</html>
