<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Neutron — chat</title>
<!-- ISSUES #208 — PWA installability: manifest + icons let Add-to-Home-
     Screen installs on the per-instance chat surface carry the Neutron
     icon + standalone display instead of an icon-less screenshot
     shortcut. The per-instance gateway serves these routes via
     landing/server.ts (same files boot.ts serves on the apex). -->
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
<link rel="manifest" href="/site.webmanifest" />
<meta name="apple-mobile-web-app-title" content="Neutron" />
<meta name="theme-color" content="#0b0d10" />
<style>
  :root {
    --bg: #0b0d10;
    --surface: #16181d;
    --border: #1d2026;
    --fg: #e9eaee;
    --muted: #8a8f99;
    --accent: #6cf;
    --user-bubble: #0a84ff;
    --user-fg: #ffffff;
    --agent-bubble: #1d2026;
    --agent-fg: #e9eaee;
    --agent-avatar-bg: #2b3037;
    --consumed-fg: #6a6f78;
    --consumed-bg: #14161b;

    --bubble-radius: 18px;
    --bubble-tail: 4px;
    /* `min(60ch, 80%)` caps wide-viewport bubbles at ~60 chars (the
       readable-line-length sweet spot for body copy) while still letting
       narrow viewports use 80% of the column. Both clauses MUST stay —
       dropping the percent loses mobile, dropping the ch unit lets
       desktop bubbles run unreadably wide. Pinned by
       __tests__/chat-bubble-css.test.ts. */
    --max-bubble-width: min(60ch, 80%);
    /* Hard floor on bubble width. A 1-char user reply ("y") rendered into
       a ~24px stutter pre-fix; 4ch keeps single-token replies looking
       like replies rather than UI noise. */
    --min-bubble-width: 4ch;
    --gutter: 16px;
    --avatar: 28px;

    /* Single source of truth for the sans-serif stack used by every text
       element on this surface. Prior code declared per-element `font:`
       shorthands ending in `-apple-system, ui-sans-serif` — when neither
       resolved (some Linux Chrome / older Edge builds), the browser
       fell back to its default *serif* and the whole chat looked like a
       legal brief. `system-ui` + `sans-serif` close the fallback chain. */
    --font-sans: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI",
      Roboto, "Helvetica Neue", Arial, ui-sans-serif, system-ui, sans-serif;
    /* Monospace stack for inline `code` spans in agent markdown bubbles
       (ISSUES #116). ui-monospace resolves to SF Mono / Menlo on Apple,
       Cascadia / Consolas on Windows — no web font fetch. */
    --font-mono: ui-monospace, "SF Mono", SFMono-Regular, Menlo, Consolas,
      "Liberation Mono", monospace;
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg); color: var(--fg);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  body {
    font: 15px/1.4 var(--font-sans);
    display: flex;
    /* 2026-05-28 sidebar sprint — body becomes a horizontal flex shell
       so the sidebar topic rail sits beside the chat column. The
       inner #chat-shell stays column-flex to keep the existing
       header / log / footer layout intact. Mobile collapses the rail
       to a slide-in drawer (`@media max-width: 768px` below). */
    flex-direction: row;
    /* 100dvh tracks the currently visible viewport on mobile (shrinks
       and grows with browser chrome). Do NOT add `min-height: 100vh` —
       vh is the LARGEST possible viewport (chrome fully collapsed) and
       a `min-height: 100vh` floor forces the body taller than the
       visible viewport, pushing the composer below the fold. Sam hit
       this on Android Chrome 2026-05-27: textarea + send button clipped
       off the bottom of `/chat`. Regression-pinned by
       __tests__/chat-html-mobile-viewport.test.ts. */
    height: 100dvh;
  }

  /* 2026-05-28 sidebar sprint — main chat column. Stays column-flex
     so existing header / log / footer layout is byte-identical for
     anyone not interacting with the sidebar. */
  #chat-shell {
    flex: 1 1 auto;
    display: flex; flex-direction: column;
    min-width: 0;
    height: 100%;
  }

  /* 2026-05-29 sidebar sprint — Telegram-style narrow topic strip.
     Always visible on every viewport (no hamburger toggle, no drawer
     backdrop). ~76px wide vertical column of avatar-over-label rows.
     Mobile and desktop share the same layout — the chat column simply
     gets the remaining viewport width. CSS contract pinned by
     __tests__/sidebar-rail-visual.test.ts. */
  #topic-rail {
    flex: 0 0 76px;
    width: 76px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  #topic-rail .rail-list {
    flex: 1 1 auto;
    overflow-y: auto;
    overscroll-behavior: contain;
    padding: 8px 0;
    /* Hide native scrollbar so the strip stays visually calm — wheel
       and touch scrolling still work. */
    scrollbar-width: none;
  }
  #topic-rail .rail-list::-webkit-scrollbar { display: none; }
  #topic-rail .rail-empty {
    padding: 14px 8px;
    color: var(--muted);
    font: 11px/1.3 var(--font-sans);
    text-align: center;
  }
  #topic-rail .topic-row {
    /* Vertical stack: avatar on top, label below. The 3px transparent
       left border reserves the gutter so swapping in the accent on the
       active row never shifts the avatar horizontally. */
    display: flex; flex-direction: column; align-items: center;
    gap: 4px;
    width: 100%;
    padding: 8px 4px;
    border: 0;
    border-left: 3px solid transparent;
    background: transparent;
    color: var(--fg);
    cursor: pointer;
    font-family: var(--font-sans);
    transition: background 140ms cubic-bezier(0.22, 1, 0.36, 1),
                border-color 140ms cubic-bezier(0.22, 1, 0.36, 1);
  }
  #topic-rail .topic-row + .topic-row { margin-top: 4px; }
  #topic-rail .topic-row:hover { background: rgba(108, 204, 255, 0.07); }
  #topic-rail .topic-row:focus-visible {
    outline: none;
    background: rgba(108, 204, 255, 0.10);
  }
  #topic-rail .topic-row[aria-current="page"] {
    background: rgba(108, 204, 255, 0.12);
    border-left-color: var(--accent);
  }
  #topic-rail .topic-row[aria-current="page"] .topic-label {
    color: var(--accent);
  }
  #topic-rail .topic-avatar {
    /* `position: relative` anchors the unread badge overlay (see
       `.topic-badge` rule below). */
    position: relative;
    width: 44px; height: 44px;
    border-radius: 50%;
    background: var(--agent-avatar-bg);
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    font: 600 18px/1 var(--font-sans);
    /* Subtle inner stroke lifts circular avatars off the dark rail
       surface — without it flat circles can blur into the chrome. */
    box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
  }
  #topic-rail .topic-row[aria-current="page"] .topic-avatar {
    box-shadow: inset 0 0 0 2px rgba(108, 204, 255, 0.55);
  }
  #topic-rail .topic-label {
    font: 500 11px/1.25 var(--font-sans);
    color: var(--muted);
    text-align: center;
    max-width: 100%;
    /* Two-line clamp keeps long project names ("Home Assistant",
       "Northwind Labs") readable without the rail growing. */
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    text-overflow: ellipsis;
    word-break: break-word;
    padding: 0 2px;
  }
  #topic-rail .topic-badge {
    /* Telegram-style unread chip — small pill anchored to the top-right
       of the avatar. The 2px surface-coloured ring punches the badge
       cleanly out of the avatar disc on either dark or accent-tinted
       active rows. */
    position: absolute;
    top: -2px; right: -4px;
    background: var(--user-bubble);
    color: var(--user-fg);
    font: 700 10px/1 var(--font-sans);
    font-variant-numeric: tabular-nums;
    padding: 2px 5px;
    border-radius: 999px;
    min-width: 16px;
    text-align: center;
    box-shadow: 0 0 0 2px var(--surface);
  }
  #topic-rail .topic-badge[hidden] { display: none; }

  header {
    flex: 0 0 auto;
    padding: 10px 18px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px;
  }
  header .logo {
    font: 600 16px/1.1 var(--font-sans);
    letter-spacing: -0.01em;
  }
  header .status {
    color: var(--muted); font-size: 12px;
    font-family: var(--font-sans);
    margin-left: auto;
  }
  header .status[data-state="connected"] { color: #4cd964; }
  header .status[data-state="connecting"],
  header .status[data-state="reconnecting"] { color: #f0b400; }
  header .status[data-state="error"],
  header .status[data-state="disconnected"] { color: #ff4d4f; }

  /* Scroll container. Pin-to-bottom is achieved via `margin-top: auto`
     on the first child (see `#log > :first-child` below), NOT via
     `justify-content: flex-end` on the container. The flex-end approach
     is a known browser bug: when content overflows, it pins the bottom
     correctly but breaks upward scrolling — scroll wheel / touch-drag
     events at the top of the visible region get clipped and the user
     cannot read prior messages. See:
     https://stackoverflow.com/questions/36130760
     Incident of record: 2026-05-22 (Sam reported "MAJOR problem,
     impossible to scroll up"). Regression-pinned by
     __tests__/chat-scroll-up.test.ts. */
  #log-wrap {
    flex: 1 1 auto;
    position: relative;
    overflow: hidden;
    display: flex;
  }
  #log {
    flex: 1 1 auto;
    overflow-y: auto;
    overscroll-behavior: contain;
    scroll-behavior: smooth;
    padding: 16px var(--gutter);
    display: flex; flex-direction: column;
    gap: 14px;
    width: 100%;
    max-width: 760px;
    margin: 0 auto;
  }
  /* Pin content to the bottom when the conversation is shorter than the
     viewport. The flex container distributes leftover space ABOVE the
     first item via `margin-top: auto`, producing the same visual result
     as `justify-content: flex-end` WITHOUT breaking scroll-up on
     overflow. */
  #log > :first-child {
    margin-top: auto;
  }

  /* Chat-history hydration (2026-05-28 sprint) — "Load earlier
     messages" button rendered as the first child of `#log` when
     more historical turns are available. Subdued, centered, just
     wide enough to land. Becomes the `:first-child` so it
     inherits the `margin-top: auto` pin (collapses to 0 when
     content overflows; absorbs slack on short conversations). */
  .load-earlier {
    align-self: center;
    margin: 8px auto;
    padding: 6px 14px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--agent-bubble);
    color: var(--agent-fg);
    font: 500 13px/1.2 var(--font-sans);
    cursor: pointer;
    transition: background 0.15s ease, opacity 0.15s ease;
  }
  .load-earlier:hover:not(:disabled) {
    background: var(--user-bubble);
    color: var(--user-fg);
  }
  .load-earlier:disabled {
    opacity: 0.5;
    cursor: progress;
  }

  /* A "run" is a maximal consecutive sequence of bubbles from the same
     sender. Bubbles within a run sit tight; runs themselves are spaced
     by #log's parent gap. */
  .run {
    display: grid;
    grid-template-columns: var(--avatar) 1fr;
    column-gap: 8px;
    row-gap: 2px;
    align-items: end;
  }
  .run.run-user {
    /* Single column for user runs. The bubble + ts + buttons children
       are explicitly placed in column 1 below — without the override,
       inherited `grid-column: 2` from the agent template would force
       them into an implicit auto-width column that 1fr squeezed to 0,
       producing the ~4-char mid-word wrap regression Sam hit on
       the chat surface 2026-05-09. */
    grid-template-columns: 1fr;
  }
  .run .avatar {
    grid-column: 1; grid-row: 1;
    width: var(--avatar); height: var(--avatar);
    border-radius: 50%;
    background: var(--agent-avatar-bg) center/cover no-repeat;
    color: var(--fg);
    display: flex; align-items: center; justify-content: center;
    font: 600 12px/1 var(--font-sans);
    align-self: end;
  }

  .bubble {
    grid-column: 2;
    max-width: var(--max-bubble-width);
    min-width: var(--min-bubble-width);
    padding: 8px 13px;
    border-radius: var(--bubble-radius);
    /* Only break at word boundaries unless a single token (URL, hash)
       is wider than the bubble. Prior `overflow-wrap: anywhere` broke
       mid-word at *every* opportunity once the grid placement bug
       above narrowed the column. `break-word` is the safe choice.
       Together with `word-break: normal` this guarantees an 8-char
       reply like "Continue" never breaks into a `Conti / nue` column
       (the failure mode in the 2026-05-12 screenshots). Pinned by
       __tests__/chat-bubble-css.test.ts. */
    overflow-wrap: break-word;
    word-break: normal;
    white-space: pre-wrap;
    line-height: 1.35;
    font-family: var(--font-sans);
  }
  .run-agent .bubble {
    background: var(--agent-bubble);
    color: var(--agent-fg);
    border: 1px solid var(--border);
    justify-self: start;
  }
  .run-user .bubble {
    background: var(--user-bubble);
    color: var(--user-fg);
    justify-self: end;
    grid-column: 1;
  }
  /* Only the last bubble in a run gets the asymmetric "tail" corner. */
  .run-agent .bubble.tail { border-bottom-left-radius: var(--bubble-tail); }
  .run-user .bubble.tail { border-bottom-right-radius: var(--bubble-tail); }

  /* ISSUES #116 — typography for the agent markdown bubble. `renderMarkdown`
     emits a fixed whitelist of tags (strong / em / code / ul / ol / li); we
     style each so the formatted text reads intentionally rather than like
     stray symbols. `white-space: pre-wrap` is inherited from `.bubble` and
     stays — newlines outside list blocks render as line breaks; list blocks
     own their own vertical spacing via margins. */
  .bubble.md strong { font-weight: 600; }
  .bubble.md em { font-style: italic; }
  .bubble.md code {
    font-family: var(--font-mono);
    /* ~92% so the mono glyphs sit level with the surrounding sans copy. */
    font-size: 0.92em;
    /* Accent-tinted, NOT a flat gray fill — the tint ties the code chip to
       the surface palette and reads as "inline token" not "disabled". */
    background: color-mix(in srgb, var(--accent) 14%, transparent);
    color: var(--agent-fg);
    padding: 1px 5px;
    border-radius: 5px;
    overflow-wrap: break-word;
  }
  .bubble.md ul,
  .bubble.md ol {
    margin: 6px 0;
    padding-left: 1.4em;
  }
  .bubble.md li { margin: 2px 0; }
  /* Collapse the leading/trailing block margin when a list is the bubble's
     first/last child so it aligns with the bubble's own padding. */
  .bubble.md > ul:first-child,
  .bubble.md > ol:first-child { margin-top: 0; }
  .bubble.md > ul:last-child,
  .bubble.md > ol:last-child { margin-bottom: 0; }

  /* 2026-05-13 — typing indicator. Optimistic client-only "the agent is
     thinking" affordance inserted on user_message send, removed when the
     next agent_message arrives. Visual: three pulsing dots in an
     agent-style bubble. No protocol change — purely client-side UX so
     the user sees IMMEDIATE acknowledgement of their input. */
  .bubble.typing {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 12px 16px;
  }
  .bubble.typing .dot {
    width: 6px;
    height: 6px;
    background: currentColor;
    border-radius: 50%;
    opacity: 0.4;
    animation: typing-pulse 1.2s infinite;
  }
  .bubble.typing .dot:nth-child(2) { animation-delay: 0.2s; }
  .bubble.typing .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typing-pulse {
    0%, 60%, 100% { opacity: 0.4; transform: translateY(0); }
    30% { opacity: 1.0; transform: translateY(-2px); }
  }

  /* 2026-06-17 (onboarding single-session rework, Step 1) — the centered
     "Setting things up…" first-load loading indicator. Covers the page-load →
     WS-open → engine.start window (the server pre-warms the conversational
     session behind it). Cleared the instant the first real content renders.
     Centered in the message column; intentionally quiet (no card, soft muted
     copy) so it reads as "warming up", not as a message. */
  .setup-indicator {
    flex: 1 1 auto;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 40vh;
  }
  .setup-indicator-inner {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }
  .setup-spinner {
    width: 22px;
    height: 22px;
    border: 2px solid color-mix(in srgb, var(--muted) 35%, transparent);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: setup-spin 0.8s linear infinite;
  }
  .setup-label {
    color: var(--muted);
    font-size: 14px;
    letter-spacing: 0.01em;
  }
  @keyframes setup-spin {
    to { transform: rotate(360deg); }
  }
  @media (prefers-reduced-motion: reduce) {
    .setup-spinner { animation-duration: 1.6s; }
  }

  /* 2026-06-17 (Argus r2) — import-progress indicator. A clean phase
     label + a determinate VISUAL progress bar + an estimated-time-
     remaining line. Replaces the prior pulsing-dots + raw "N/M batches"
     readout (Ryan's hard requirement: a bar + ETA, never chunk numbers).
     The agent-bubble fill is kept for the avatar/tail vocabulary. */
  .bubble.import-progress {
    display: flex;
    flex-direction: column;
    gap: 7px;
    width: min(320px, 80%);
    padding: 12px 16px;
  }
  .bubble.import-progress .import-progress-body {
    font: 13px/1.4 var(--font-sans);
    font-weight: 500;
    opacity: 0.95;
  }
  /* The bar: a hairline track with a smooth accent fill. Determinate
     fill is width-driven (server pct); the indeterminate state (Pass 1
     streaming-fallback / first sample) uses a sweeping shimmer so the
     user still sees motion while we have no honest denominator. */
  .bubble.import-progress .import-progress-bar {
    width: 100%;
    height: 6px;
    border: none;
    border-radius: 999px;
    overflow: hidden;
    background: var(--bg);
    -webkit-appearance: none;
    appearance: none;
  }
  .bubble.import-progress .import-progress-bar::-webkit-progress-bar {
    background: var(--bg);
    border-radius: 999px;
  }
  .bubble.import-progress .import-progress-bar::-webkit-progress-value {
    background: linear-gradient(90deg, var(--accent), #9fe0ff);
    border-radius: 999px;
    transition: width 420ms cubic-bezier(0.22, 1, 0.36, 1);
  }
  .bubble.import-progress .import-progress-bar::-moz-progress-bar {
    background: linear-gradient(90deg, var(--accent), #9fe0ff);
    border-radius: 999px;
  }
  /* Indeterminate: no `value` attribute → sweeping shimmer across the
     track (data-determinate="false" is set by chat.ts). */
  .bubble.import-progress .import-progress-bar[data-determinate="false"] {
    background:
      linear-gradient(90deg, transparent, color-mix(in srgb, var(--accent) 70%, transparent), transparent)
      no-repeat,
      var(--bg);
    background-size: 40% 100%;
    animation: import-progress-sweep 1.3s ease-in-out infinite;
  }
  @keyframes import-progress-sweep {
    0% { background-position: -40% 0; }
    100% { background-position: 140% 0; }
  }
  .bubble.import-progress .import-progress-eta {
    font: 11px/1.3 var(--font-sans);
    color: var(--muted);
    letter-spacing: 0.01em;
  }
  @media (prefers-reduced-motion: reduce) {
    .bubble.import-progress .import-progress-bar[data-determinate="false"] {
      animation: none;
    }
    .bubble.import-progress .import-progress-bar::-webkit-progress-value {
      transition: none;
    }
  }

  .ts {
    grid-column: 2;
    font: 11px/1 var(--font-sans);
    color: var(--muted);
    margin-top: 2px;
    padding: 0 4px;
  }
  .run-user .ts { justify-self: end; grid-column: 1; }
  .run-agent .ts { justify-self: start; }

  /* Button prompts — Telegram-style inline keyboard. Each button is a
     distinct tappable affordance, visually separated from chat bubbles
     via the accent-tinted background + accent-tinted border. Grid
     layout flexes between 1, 2, and 3 columns based on the longest
     option's label length (computed in chat.ts):
       cols=3 — every label ≤ 12 chars (e.g. "Yes" / "No" / "Skip")
       cols=2 — default for medium labels (≤ 24 chars)
       cols=1 — at least one label > 24 chars
     Argus / Sam 2026-05-28 walkthrough — the legacy `flex-direction:
     column` + `text-align: left` + neutral surface treatment made the
     buttons look like consumed chat bubbles, not affordances. The grid
     + accent tint restores the "this is a button" signal Telegram's
     inline keyboard relies on. */
  .buttons {
    grid-column: 2;
    display: grid;
    grid-template-columns: 1fr;
    gap: 8px;
    margin-top: 8px;
    width: 100%;
    max-width: var(--max-bubble-width);
  }
  .buttons.cols-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .buttons.cols-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  .run-user .buttons { grid-column: 1; }
  .run-agent .buttons { justify-self: stretch; }
  .buttons button {
    width: 100%;
    /* Accent-tinted gradient + accent border carve the affordance
       out of the conversation surface so users recognize "tap" vs
       "read". Subtle enough to not scream at the rest of the chat;
       pronounced enough that on a 6" screen the buttons are
       unmistakable. */
    background: linear-gradient(180deg, rgba(108, 204, 255, 0.08), rgba(108, 204, 255, 0.03));
    color: var(--fg);
    border: 1px solid rgba(108, 204, 255, 0.32);
    padding: 10px 14px;
    border-radius: 12px;
    cursor: pointer;
    /* Weight 600 (vs the body's 400 weight) emphasizes tappability
       without leaning on color alone. */
    font: 600 14px/1.3 var(--font-sans);
    text-align: center;
    transition: background 120ms ease, border-color 120ms ease,
      transform 80ms ease;
    /* Long labels get truncated rather than wrapping into 3-line
       mountains; cols-1 already accommodates true long copy. */
    overflow: hidden;
    text-overflow: ellipsis;
    min-height: 38px;
  }
  .buttons button:hover:not(:disabled) {
    background: linear-gradient(180deg, rgba(108, 204, 255, 0.16), rgba(108, 204, 255, 0.08));
    border-color: rgba(108, 204, 255, 0.6);
  }
  .buttons button:active:not(:disabled) {
    transform: scale(0.98);
  }
  .buttons button:disabled {
    cursor: default;
    color: var(--consumed-fg);
    background: var(--consumed-bg);
    border-color: var(--border);
  }
  .buttons.consumed button.picked {
    color: var(--fg);
    border-color: var(--accent);
    background: rgba(108, 204, 255, 0.22);
  }

  /* Sprint 28 — image-gallery prompt: thumbnails laid out as a grid. */
  .buttons.image-gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 10px;
    max-width: 100%;
  }
  .buttons.image-gallery .thumb {
    display: flex; flex-direction: column; gap: 6px; padding: 6px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; cursor: pointer; text-align: center;
  }
  .buttons.image-gallery .thumb:hover:not(:disabled) {
    border-color: var(--accent);
  }
  .buttons.image-gallery .thumb img {
    width: 100%; aspect-ratio: 1 / 1; object-fit: cover;
    border-radius: 8px; display: block;
  }
  .buttons.image-gallery .thumb-caption {
    font: 500 13px/1.2 var(--font-sans); color: var(--fg);
  }

  /* 2026-05-29 in-place topic switch sprint — "—— New ——" divider
     above the first unread message on first-mount of a topic with
     unread prompts (Telegram pattern). Subtle horizontal line +
     muted-accent label; auto-removes on switch-back so it doesn't
     stack across switches. Pinned by __tests__/topic-switch-scroll.test.ts. */
  .new-divider {
    align-self: stretch;
    display: flex;
    align-items: center;
    gap: 12px;
    color: var(--accent);
    font: 600 11px/1.3 var(--font-sans);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 0 4px;
    margin: 8px 0 4px;
    opacity: 0.85;
  }
  .new-divider::before,
  .new-divider::after {
    content: '';
    flex: 1 1 auto;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(108, 204, 255, 0.45), transparent);
  }
  .new-divider .new-divider-label {
    flex: 0 0 auto;
  }

  /* "↓ N new" pill, anchored bottom-right of the scroll viewport
     (Telegram pattern, restored 2026-05-29). Spring on enter, hairline
     shadow for depth, subtle accent-tinted edge so the affordance reads
     as "tap me" not "ad". */
  .new-pill {
    position: absolute;
    right: 16px; bottom: 14px;
    background: var(--user-bubble); color: var(--user-fg);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 999px;
    padding: 8px 14px;
    font: 600 13px/1 var(--font-sans);
    font-variant-numeric: tabular-nums;
    cursor: pointer;
    box-shadow:
      0 4px 14px rgba(10, 132, 255, 0.32),
      0 1px 2px rgba(0, 0, 0, 0.4);
    transition:
      opacity 160ms cubic-bezier(0.22, 1, 0.36, 1),
      transform 160ms cubic-bezier(0.22, 1, 0.36, 1),
      box-shadow 160ms cubic-bezier(0.22, 1, 0.36, 1);
    z-index: 2;
  }
  .new-pill[hidden] { display: none; }
  .new-pill:hover {
    transform: translateY(-1px);
    box-shadow:
      0 6px 18px rgba(10, 132, 255, 0.42),
      0 1px 2px rgba(0, 0, 0, 0.4);
  }
  .new-pill:active { transform: translateY(0); }

  /* Composer footer — multi-line auto-grow textarea + send button. */
  footer {
    flex: 0 0 auto;
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 10px var(--gutter);
    /* iOS keyboard safe-area */
    padding-bottom: max(10px, env(safe-area-inset-bottom));
  }
  .composer {
    display: flex; gap: 8px; align-items: flex-end;
    max-width: 760px; margin: 0 auto;
  }
  .composer textarea {
    flex: 1 1 auto;
    resize: none;
    padding: 10px 14px;
    border-radius: 18px;
    background: var(--bg);
    color: var(--fg);
    border: 1px solid var(--border);
    font: 15px/1.35 var(--font-sans);
    min-height: 38px;
    max-height: calc(1.35em * 6 + 22px); /* ~6 lines + padding */
    overflow-y: auto;
  }
  .composer textarea:focus {
    outline: none;
    border-color: var(--accent);
  }
  .composer button {
    flex: 0 0 auto;
    padding: 9px 14px;
    border-radius: 18px;
    background: var(--user-bubble);
    color: var(--user-fg);
    border: 1px solid var(--user-bubble);
    cursor: pointer;
    font: 600 14px/1.2 var(--font-sans);
    transition: opacity 120ms ease;
  }
  .composer button:disabled {
    opacity: 0.5; cursor: default;
  }

  /* P2 v2 § 6.2 (S4) — upload affordance row. Lives above the composer
     and is shown only while the agent's last message carried an
     `upload_affordance` envelope (i.e. phase = import_upload_pending).
     The file picker is the primary, always-present surface; the
     drag-drop overlay below is a desktop enhancement.
     Hidden by default via `[hidden]` — chat.ts toggles visibility. */
  .upload-bar {
    max-width: 760px;
    margin: 0 auto 8px;
    display: flex; gap: 8px; align-items: center;
    flex-wrap: wrap;
    padding: 8px 12px;
    background: #1b1f26;
    border: 1px dashed var(--border);
    border-radius: 12px;
    font-family: var(--font-sans);
    font-size: 13px;
    color: var(--muted);
  }
  .upload-bar[hidden] { display: none; }
  .upload-bar .upload-label { flex: 1 1 auto; min-width: 0; }
  .upload-bar .upload-button {
    flex: 0 0 auto;
    padding: 6px 12px;
    background: var(--surface);
    color: var(--fg);
    border: 1px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    font: 600 13px/1.2 var(--font-sans);
  }
  .upload-bar .upload-button:hover { border-color: var(--accent); }
  .upload-bar .upload-button:disabled { opacity: 0.5; cursor: progress; }
  .upload-bar input[type="file"] {
    /* Hidden file input — clicking the visible button forwards via
       chat.ts. Display:none keeps tab order clean (the visible button
       is the focusable affordance). */
    display: none;
  }
  .upload-bar.error { color: #ff7a7a; border-color: #ff4d4f; }

  /* Phase-1 upload progress UI. Surfaces while the XHR upload is in
     flight (cancel + determinate bar) or after a terminal error (retry).
     Both buttons mirror the geometry of `.upload-button` so the row
     doesn't jitter when state flips. The progress bar lives on its own
     flex row (basis 100%) below the label/buttons. */
  .upload-bar .upload-cancel,
  .upload-bar .upload-retry {
    flex: 0 0 auto;
    padding: 6px 12px;
    background: transparent;
    color: var(--fg);
    border: 1px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    font: 600 13px/1.2 var(--font-sans);
  }
  .upload-bar .upload-cancel:hover,
  .upload-bar .upload-retry:hover { border-color: var(--accent); }
  .upload-bar.error .upload-retry { border-color: var(--accent); }
  .upload-bar .upload-cancel[hidden],
  .upload-bar .upload-retry[hidden] { display: none; }

  /* Smooth linear fill — no bounce, no spring, no elastic. Subtle
     accent line on a hairline track to match the chat surface
     vocabulary. The flex-basis: 100% pushes it onto its own row. */
  .upload-bar .upload-progress {
    flex: 0 0 100%;
    width: 100%;
    height: 4px;
    margin-top: 2px;
    border: none;
    border-radius: 999px;
    overflow: hidden;
    background: var(--bg);
    -webkit-appearance: none;
    appearance: none;
  }
  .upload-bar .upload-progress[hidden] { display: none; }
  .upload-bar .upload-progress::-webkit-progress-bar {
    background: var(--bg);
    border-radius: 999px;
  }
  .upload-bar .upload-progress::-webkit-progress-value {
    background: var(--accent);
    border-radius: 999px;
    transition: width 120ms linear;
  }
  .upload-bar .upload-progress::-moz-progress-bar {
    background: var(--accent);
    border-radius: 999px;
  }
  .upload-bar.error .upload-progress::-webkit-progress-value { background: #ff4d4f; }
  .upload-bar.error .upload-progress::-moz-progress-bar { background: #ff4d4f; }

  /* Drag-and-drop overlay — full-viewport semi-transparent overlay with
     centered text + dashed outline. Toggled by chat.ts via the
     `data-active="true"` attribute. Pointer-events all so dragleave/drop
     fire on the overlay itself rather than the underlying chat bubbles. */
  .upload-overlay {
    position: fixed;
    inset: 0;
    background: rgba(11, 13, 16, 0.86);
    border: 4px dashed var(--accent);
    display: flex; align-items: center; justify-content: center;
    color: var(--fg);
    font: 600 22px/1.3 var(--font-sans);
    z-index: 100;
    text-align: center;
    padding: 24px;
    pointer-events: auto;
  }
  .upload-overlay[hidden] { display: none; }

  /* M2.5 — "Connect to a relay" cross-instance affordance. Open
     self-hosters connect their instance so the shared projects they're
     invited to surface across devices. Header trigger + inline disclosure
     panel (no modal — progressive disclosure off the header). Shares the
     chat surface's accent-tint vocabulary so it reads as native chrome,
     not a bolted-on widget. */
  .ct-trigger {
    margin-left: auto;
    display: inline-flex; align-items: center; gap: 7px;
    padding: 5px 11px;
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 999px;
    cursor: pointer;
    font: 600 12px/1 var(--font-sans);
    letter-spacing: -0.005em;
    transition: border-color 140ms cubic-bezier(0.22, 1, 0.36, 1),
                color 140ms cubic-bezier(0.22, 1, 0.36, 1),
                background 140ms cubic-bezier(0.22, 1, 0.36, 1);
  }
  /* The trigger takes over the right-edge slot; the live ws-status text
     that previously claimed `margin-left:auto` sits just after it with a
     small gap. */
  .ct-trigger + .status { margin-left: 12px; }
  .ct-trigger:hover {
    color: var(--fg);
    border-color: rgba(108, 204, 255, 0.4);
    background: rgba(108, 204, 255, 0.06);
  }
  .ct-trigger:focus-visible {
    outline: none;
    border-color: var(--accent);
    color: var(--fg);
  }
  .ct-trigger[hidden] { display: none; }
  .ct-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--muted);
    box-shadow: 0 0 0 0 transparent;
    transition: background 160ms ease, box-shadow 160ms ease;
  }
  .ct-trigger--connected { color: var(--fg); border-color: rgba(76, 217, 100, 0.4); }
  .ct-trigger--connected .ct-dot {
    background: #4cd964;
    box-shadow: 0 0 0 3px rgba(76, 217, 100, 0.16);
  }

  .ct-panel {
    position: fixed;
    top: 54px; right: 16px;
    width: min(320px, calc(100vw - 32px));
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 18px 18px 16px;
    z-index: 60;
    box-shadow:
      0 18px 40px rgba(0, 0, 0, 0.45),
      0 2px 6px rgba(0, 0, 0, 0.35);
    /* Quiet entrance — fade + a few px of settle, ease-out, no bounce. */
    animation: ct-panel-in 180ms cubic-bezier(0.22, 1, 0.36, 1);
  }
  .ct-panel[hidden] { display: none; }
  @keyframes ct-panel-in {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .ct-title {
    margin: 0 0 7px;
    font: 600 15px/1.25 var(--font-sans);
    letter-spacing: -0.01em;
    color: var(--fg);
  }
  .ct-body {
    margin: 0 0 16px;
    font: 13px/1.5 var(--font-sans);
    color: var(--muted);
    max-width: 40ch;
  }
  .ct-body strong { color: var(--fg); font-weight: 600; }
  .ct-actions { display: flex; gap: 8px; }
  .ct-btn {
    padding: 9px 16px;
    border-radius: 11px;
    cursor: pointer;
    font: 600 13px/1.2 var(--font-sans);
    transition: background 120ms ease, border-color 120ms ease,
                transform 80ms ease, opacity 120ms ease;
  }
  .ct-btn:active:not(:disabled) { transform: scale(0.98); }
  .ct-btn:disabled { cursor: default; opacity: 0.6; }
  .ct-btn--primary {
    background: var(--user-bubble);
    color: var(--user-fg);
    border: 1px solid var(--user-bubble);
  }
  .ct-btn--primary:hover:not(:disabled) { background: #2a93ff; border-color: #2a93ff; }
  .ct-btn--ghost {
    background: transparent;
    color: var(--fg);
    border: 1px solid var(--border);
  }
  .ct-btn--ghost:hover:not(:disabled) { border-color: rgba(255, 122, 122, 0.5); color: #ff9b9b; }

  .ct-toast {
    position: fixed;
    bottom: 18px;
    left: 50%;
    transform: translate(-50%, 8px);
    max-width: min(420px, calc(100vw - 32px));
    background: var(--surface);
    color: var(--fg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 11px 16px;
    font: 500 13px/1.4 var(--font-sans);
    box-shadow: 0 10px 28px rgba(0, 0, 0, 0.4);
    z-index: 70;
    opacity: 0;
    transition: opacity 200ms cubic-bezier(0.22, 1, 0.36, 1),
                transform 200ms cubic-bezier(0.22, 1, 0.36, 1);
  }
  .ct-toast[hidden] { display: none; }
  .ct-toast--in { opacity: 1; transform: translate(-50%, 0); }
  /* State accents via a leading colored glyph (no side-stripe). */
  .ct-toast[data-kind="ok"] { border-color: rgba(76, 217, 100, 0.45); }
  .ct-toast[data-kind="error"] { border-color: rgba(255, 107, 107, 0.5); }
</style>
</head>
<body>
<!-- 2026-05-29 sidebar sprint — Telegram-style narrow topic strip.
     Always visible on every viewport. Each row is a vertical stack
     (avatar above, small text label below). No hamburger toggle,
     no slide-in drawer. -->
<aside id="topic-rail" aria-label="Chat topics">
  <nav class="rail-list" id="rail-list" aria-label="Topic list">
    <!-- Static fallback row so the chat surface always has a target to
         render even before the /api/v1/chat/topics fetch resolves
         (network slow, route unmounted, etc). chat.ts replaces this
         once the real list arrives. -->
    <button type="button" class="topic-row" data-topic-id="" data-topic="general" aria-current="page" data-fallback="true">
      <span class="topic-avatar">#<span class="topic-badge" hidden>0</span></span>
      <span class="topic-label">General</span>
    </button>
  </nav>
</aside>
<div id="chat-shell">
<header>
  <div class="logo">Neutron</div>
  <div class="status" id="status" data-state="connecting">connecting</div>
</header>
<div id="log-wrap">
  <div id="log" aria-live="polite"></div>
  <button id="new-pill" class="new-pill" type="button" hidden>↓ new</button>
</div>
<footer>
  <div class="upload-bar" id="upload-bar" hidden>
    <span class="upload-label" id="upload-label">Upload your export ZIP</span>
    <button class="upload-button" id="upload-button" type="button" data-source="chatgpt">Choose file</button>
    <input type="file" id="upload-input" accept=".zip,application/zip" />
    <!-- Phase-1 progress UI (chat.ts toggles `[hidden]` on each):
         cancel surfaces while an XHR upload is in-flight; retry surfaces
         after a terminal error (413, etc); progress bar fills as bytes
         leave the wire (driven by xhr.upload.onprogress). -->
    <button class="upload-cancel" id="upload-cancel" type="button" hidden>Cancel</button>
    <button class="upload-retry" id="upload-retry" type="button" hidden>Retry</button>
    <progress class="upload-progress" id="upload-progress" max="100" value="0" hidden></progress>
  </div>
  <div class="composer">
    <textarea id="input" rows="1" placeholder="Message" autocomplete="off"
      autocapitalize="sentences" spellcheck="true" enterkeyhint="send"></textarea>
    <button id="send" type="button">Send</button>
  </div>
</footer>
<div class="upload-overlay" id="upload-overlay" hidden>
  <span id="upload-overlay-text">Drop your export here</span>
</div>
</div><!-- /#chat-shell -->
<script>
  // Codex r4 P1 fix: scrub the start_token from the URL BEFORE loading
  // chat.js so the same-origin Referer on the chat.js fetch does not
  // leak the token, and the browser history does not retain it. We
  // stash it on `window` for chat.js to read, then immediately replace
  // the URL with a clean /chat path. The token still rides the original
  // request URL the user landed on; that's a one-shot exposure that
  // the atomic consumeStartToken jti claim makes inert after first use.
  (function () {
    try {
      var params = new URLSearchParams(window.location.search);
      var token = params.get('start');
      // T13 — preserve a `?debug=1` flag across the start-token scrub
      // so the harness's WS-trace hook in chat.ts knows to record WS
      // events into `window.__neutronWsTrace`. The flag stays on the
      // page via a window-global instead of the URL so the scrub can
      // still purge the entire query string. Strictly opt-in: absent
      // debug=1 leaves __neutron_debug undefined and the WS hook is a
      // no-op. Operators / e2e harness opt in by appending &debug=1 to
      // the chat URL; production users never see it.
      //
      // Codex T13 P2 #2 — persist to sessionStorage so the flag
      // survives same-origin redirects (the slug-rename handoff that
      // navigates from /chat?start=... on the old subdomain to a
      // freshly-minted /chat?start=... on the renamed subdomain via
      // `window.location.replace`, plus the handleClose() reconnect
      // path that hits /recover). Without the stash, the redirected
      // page only sees the new start token in the URL — no debug=1
      // — and the WS-trace buffer goes dark for the remainder of the
      // walk. sessionStorage is per-origin per-tab so cross-instance
      // browsing won't accidentally inherit; the same-origin redirect
      // case (which is what e2e and the slug-rename redeem both hit)
      // does inherit, which is exactly what we want.
      // Codex T13 r13 P3 — debug is URL-borne only, no session storage.
      // chat.ts's handleRedirect / handleClose paths always append
      // `&debug=1` to navigation targets when debug is on (mirrored
      // server-side by the /recover Location preservation), so a
      // valid chat.ts-initiated redirect chain keeps debug alive
      // through the URL alone. Removing the session-storage stash
      // eliminates the cross-origin leak (sessionStorage is origin-
      // scoped so source-side markers survived navigations and
      // re-enabled debug on later plain visits to the source origin).
      // Plus aggressively scrub any pre-existing stash from older
      // chat.js versions so previous runs don't haunt the operator.
      if (params.get('debug') === '1') {
        window.__neutron_debug = true;
      }
      try {
        window.sessionStorage.removeItem('neutron_debug');
        window.sessionStorage.removeItem('neutron_debug_redirect');
      } catch (e) { /* sandboxed */ }
      if (token) {
        // 2026-05-27 persistent-session-cookie sprint — this stash
        // was used by the (now-removed) chat.ts /recover auto-fire
        // path. With the auth-gate-owns-bounce model the stash has
        // no active reader; keep it temporarily for any
        // backward-compat readers (e.g. older chat.js cached in a
        // browser tab still in flight during a deploy). Safe to
        // delete in a follow-up sprint once cache TTLs have elapsed.
        window.__neutron_start_token = token;
        var clean = window.location.pathname;
        window.history.replaceState(null, '', clean);
      }
    } catch (e) {
      // Scrubbing is best-effort; chat.ts falls back to reading from
      // location.search if the stash is unavailable.
    }
  })();
</script>
<script type="module" src="/chat.js"></script>
</body>
</html>
