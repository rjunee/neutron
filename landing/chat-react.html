<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Neutron — chat</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
<link rel="manifest" href="/site.webmanifest" />
<meta name="apple-mobile-web-app-title" content="Neutron" />
<meta name="theme-color" content="#0b0d10" />
<script>
  // Pre-paint theme resolution — sets data-theme on <html> BEFORE the stylesheet
  // below paints, so a user who prefers/last-chose light never sees a dark flash
  // (FOUC). This is a tiny, dependency-free MIRROR of the resolution in
  // landing/chat-react/theme.ts (which can't be imported inline); React's
  // useTheme hook re-applies + owns the attribute after mount. Same key
  // ('neutron-theme') and same rule: explicit 'light'/'dark' wins; anything else
  // ('system' / absent / corrupt) follows prefers-color-scheme.
  (function () {
    try {
      var pref = null;
      try { pref = window.localStorage.getItem('neutron-theme'); } catch (e) {}
      if (pref !== 'light' && pref !== 'dark') pref = 'system';
      var systemLight = false;
      try { systemLight = window.matchMedia('(prefers-color-scheme: light)').matches; } catch (e) {}
      var resolved = pref === 'light' ? 'light' : pref === 'dark' ? 'dark' : (systemLight ? 'light' : 'dark');
      document.documentElement.setAttribute('data-theme', resolved);
      var meta = document.querySelector('meta[name="theme-color"]');
      if (meta) meta.setAttribute('content', resolved === 'light' ? '#f5f5f7' : '#0b0d10');
    } catch (e) { /* leave data-theme unset → :root dark defaults apply */ }
  })();
</script>
<style>
  /* ─────────────────────────────────────────────────────────────────────────
     THEME (light/dark) — Ryan-requested 2026-07-01.
     The stylesheet is ENTIRELY CSS-variable-driven: `:root` holds the DARK
     palette (the historical default + the fallback when no data-theme is set),
     and `:root[data-theme="light"]` overrides the SAME vars with an
     iMessage-on-iPhone light palette. Every color below resolves through a var,
     so there are NO dark-only leftovers — flipping `data-theme` reskins the whole
     UI with ONE stylesheet (no dual code paths). The effective theme
     (`data-theme="light"|"dark"`) is resolved from the persisted preference +
     `prefers-color-scheme` by the pre-paint inline script in <head> and the
     React `useTheme` hook (landing/chat-react/theme.ts).
     ───────────────────────────────────────────────────────────────────────── */
  :root {
    /* Core surfaces + text */
    --bg: #0b0d10;
    --surface: #16181d;
    --border: #1d2026;
    --fg: #e9eaee;
    --muted: #8a8f99;
    --accent: #6cf;
    /* Text/icon drawn ON an accent-filled surface (primary buttons, badges). */
    --on-accent: #04121f;
    /* M1 UX REDESIGN — rail work-activity dot + secondary text ramp (Telegram
       2-line rows). --work = the live-build dot/unread fill, --attention = the
       needs-you amber, --fg-2 = unread preview text, --faint = "You:" / meta. */
    --work: #6cf;
    --attention: #ffd27d;
    --fg-2: #c7ccd6;
    --faint: #5f646e;
    /* Chat bubbles */
    --user-bubble: #0a84ff;
    --user-fg: #ffffff;
    --agent-bubble: #1d2026;
    --agent-fg: #e9eaee;
    --agent-avatar-bg: #2b3037;
    --bubble-radius: 18px;
    /* Hover / active / accent tints (rail, lists, rows, filters, flash). */
    --hover-bg: rgba(255,255,255,.05);
    --hover-bg-weak: rgba(255,255,255,.04);
    --active-bg: rgba(108,170,255,.16);
    --active-fg: #cfe6ff;
    --accent-tint: rgba(108,170,255,.12);
    --accent-tint-weak: rgba(108,170,255,.10);
    --accent-flash: rgba(108,170,255,.18);
    --accent-border: rgba(108,170,255,.4);
    /* Code (inline + block) */
    --code-bg: rgba(255,255,255,.08);
    --code-block-bg: #0c0e12;
    /* Status: danger/error, warn, info, success */
    --danger: #e5534b;
    --error-fg: #ff8a8a;
    --error-border: rgba(255,138,138,.4);
    --warn-fg: #ffd27d;
    --warn-border: rgba(255,210,125,.4);
    --info-fg: #8cc6ff;
    --info-border: rgba(140,198,255,.4);
    --info-track: rgba(140,198,255,.18);
    --info-ring: rgba(140,198,255,.3);
    --success-fg: #7ddf9b;
    --success-border: rgba(125,223,155,.4);
    /* M1 UX REDESIGN — Work-list phase tokens (dot + tag): a tinted bg + a
       colored fg per build lifecycle step. Build=blue, review=purple, fix=amber,
       merged=green, failed=red. Used by the pulse-in-tag-color dot + the phase tag. */
    --phase-build-fg: #8cc6ff;   --phase-build-bg: rgba(140,198,255,.14);
    --phase-review-fg: #a8a2ff;  --phase-review-bg: rgba(168,162,255,.14);
    --phase-fix-fg: #ffd27d;     --phase-fix-bg: rgba(255,210,125,.14);
    --phase-merged-fg: #7ddf9b;  --phase-merged-bg: rgba(125,223,155,.14);
    --phase-failed-fg: #ff8a8a;  --phase-failed-bg: rgba(255,138,138,.14);
    /* Connection banners */
    --banner-warn-bg: #2a2410;   --banner-warn-fg: #ffd479;
    --banner-info-bg: #18222e;   --banner-info-fg: #8cc6ff;
    --banner-error-bg: #2a1416;  --banner-error-fg: #ff8a8a;
    /* Overlays (drag-and-drop scrim/frame, image gallery label) */
    --scrim: rgba(10,10,10,0.62);
    --dropzone-frame-bg: rgba(18,18,18,0.92);
    --gallery-label-bg: rgba(10,10,10,0.7);
    --gallery-label-fg: #fff;
    /* Misc controls */
    --cancel-bg: #3a3f47;
    /* BUG 1 — centered, constrained chat column width (mirrors .cint-scroll's
       760px); applied to message rows + composer + status lines so the chat is
       a centered column on wide screens, full-width (margins collapse) on mobile. */
    --chat-col: 760px;
    /* M1 UX REDESIGN PR-4 — the desktop WORK slide-out pane. `--pane-width` is
       the grid column the pane occupies when open (chat shrinks by this much);
       `--ease-out` is the shared slide easing (no bounce), gated by
       prefers-reduced-motion. Theme-agnostic, so defined once here. */
    --pane-width: 340px;
    --ease-out: cubic-bezier(0.32, 0.72, 0, 1);
  }
  /* LIGHT — iMessage-on-iPhone palette: white chat surface, the #007AFF iMessage
     blue for the user bubble, ~#E9E9EB grey agent bubbles with near-black text,
     subtle iOS separators. Same vars, so every surface reskins. */
  :root[data-theme="light"] {
    --bg: #ffffff;
    --surface: #f5f5f7;
    --border: #d1d1d6;
    --fg: #1c1c1e;
    --muted: #8a8a8e;
    --accent: #007aff;
    --on-accent: #ffffff;
    --work: #007aff;
    /* FIX #345 — a clean, clearly-amber attention dot. The old #9a6a00 read as a
       muddy brown; this golden amber stays visibly amber and distinct from both
       the build-blue (--phase-build-fg) and the failed-red (--phase-failed-fg). */
    --attention: #e0a020;
    --fg-2: #3a3f4a;
    --faint: #aeb2ba;
    --user-bubble: #007aff;
    --user-fg: #ffffff;
    --agent-bubble: #e9e9eb;
    --agent-fg: #1c1c1e;
    --agent-avatar-bg: #d1d1d6;
    --hover-bg: rgba(0,0,0,.05);
    --hover-bg-weak: rgba(0,0,0,.035);
    --active-bg: rgba(0,122,255,.12);
    --active-fg: #0b57d0;
    --accent-tint: rgba(0,122,255,.10);
    --accent-tint-weak: rgba(0,122,255,.07);
    --accent-flash: rgba(0,122,255,.14);
    --accent-border: rgba(0,122,255,.4);
    --code-bg: rgba(0,0,0,.06);
    --code-block-bg: #f5f5f7;
    --danger: #d70015;
    --error-fg: #c9252d;
    --error-border: rgba(201,37,45,.4);
    --warn-fg: #9a6a00;
    --warn-border: rgba(154,106,0,.35);
    --info-fg: #0b57d0;
    --info-border: rgba(11,87,208,.35);
    --info-track: rgba(11,87,208,.14);
    --info-ring: rgba(11,87,208,.25);
    --success-fg: #1a7f37;
    --success-border: rgba(26,127,55,.35);
    /* M1 UX REDESIGN — Work-list phase tokens, light variants (per the prototype).
       Darker fg for AA contrast on white; lighter tint bg. */
    --phase-build-fg: #0b57d0;   --phase-build-bg: rgba(11,87,208,.10);
    --phase-review-fg: #5b4bd6;  --phase-review-bg: rgba(91,75,214,.12);
    --phase-fix-fg: #9a6a00;     --phase-fix-bg: rgba(154,106,0,.12);
    --phase-merged-fg: #1a7f37;  --phase-merged-bg: rgba(26,127,55,.12);
    --phase-failed-fg: #c9252d;  --phase-failed-bg: rgba(201,37,45,.10);
    --banner-warn-bg: #fff4d6;   --banner-warn-fg: #7a5b00;
    --banner-info-bg: #e6f0ff;   --banner-info-fg: #0b57d0;
    --banner-error-bg: #ffe5e5;  --banner-error-fg: #c9252d;
    --scrim: rgba(0,0,0,0.35);
    --dropzone-frame-bg: #ffffff;
    --gallery-label-bg: rgba(0,0,0,0.55);
    --gallery-label-fg: #fff;
    --cancel-bg: #d1d1d6;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  #root { height: 100dvh; }
  /* Web app shell (rail/tab rework 2026-06-30): persistent project rail (left)
     + content column (tab bar over the active tab body). */
  .car-app { display: flex; height: 100dvh; min-height: 0; width: 100%; overflow: hidden; }
  .car-content { flex: 1 1 auto; display: flex; flex-direction: column; min-width: 0; min-height: 0; }
  /* Chat stage: the region BELOW the tab band, holding the tab panels. M1 polish
     (item 3+5) — the desktop Work pane no longer lives here (it moved INTO the Chat
     view so it's scoped to the Chat tab, with the composer as a full-width footer),
     so the stage is a plain flex box, not a 2-column grid. */
  .car-stage {
    flex: 1 1 auto; min-height: 0; min-width: 0; position: relative; display: flex;
  }
  /* Top bar row: the section tab bar fills the row; the theme toggle is pinned
     to the far right. The band's surface + bottom border live here so the tabs
     and the toggle share one seamless strip. */
  /* Seated tabs (M1 UX redesign) — the tab band reads as the page's top edge: a
     surface strip whose ACTIVE tab lifts onto the content sheet (fused via a
     -1px bottom margin over the band's own bottom border). No sliding underline. */
  .car-topbar {
    display: flex; align-items: flex-end; flex: 0 0 auto; gap: 2px;
    padding: 8px 10px 0; background: var(--surface); border-bottom: 1px solid var(--border);
  }
  /* Workspace-identity seat — the "you're inside a workspace" anchor, left of the
     tabs. Emoji + name; General shows 💬 General. NO activity dot (that lives on
     the rail — Ryan's de-dup keeps the seat clean). */
  .car-wsseat {
    flex: 0 1 auto; min-width: 0; display: flex; align-items: center; gap: 7px;
    padding: 6px 12px 10px; font-size: 14px; font-weight: 590; color: var(--fg);
  }
  .car-wsseat-emoji { flex: 0 0 auto; font-size: 16px; line-height: 1; }
  .car-wsseat-name { min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  /* FIX #350 — the band no longer scrolls horizontally; overflowing tabs
     collapse into a "⋯" menu (measured in JS). `position: relative` anchors both
     the hidden measurement mirror and the overflow dropdown; `overflow: visible`
     lets the dropdown escape the band (JS keeps inline tabs within the width, so
     nothing spills in practice). */
  .car-tabs {
    display: flex; align-items: flex-end; gap: 2px; flex: 1 1 auto; min-width: 0;
    position: relative; overflow: visible;
  }
  /* Off-layout measurement copy of every tab at its natural width. */
  .car-tabs-mirror {
    position: absolute; top: 0; left: 0; z-index: -1;
    display: flex; gap: 2px; visibility: hidden; pointer-events: none; white-space: nowrap;
  }
  .car-tab {
    appearance: none; background: transparent; color: var(--muted);
    border: 1px solid transparent; border-bottom: 0; margin: 0;
    padding: 7px 15px; font: inherit; font-size: 13.5px; font-weight: 400;
    cursor: pointer; white-space: nowrap; border-radius: 9px 9px 0 0;
    transition: color .12s ease, background .12s ease;
  }
  .car-tab:hover:not(:disabled) { background: var(--hover-bg); color: var(--fg-2); }
  .car-tab:focus-visible { outline: 2px solid var(--accent); outline-offset: -2px; }
  .car-tab:disabled { opacity: .5; cursor: default; }
  /* Active tab fuses to the content sheet below: bg matches the page, a border
     minus its bottom edge, pulled 1px down over the band's bottom border. */
  .car-tab-active {
    color: var(--fg); font-weight: 590; background: var(--bg);
    border-color: var(--border); margin-bottom: -1px;
  }
  /* Light/dark theme toggle — pinned top-right of the content pane. A single
     pill button that cycles system → light → dark; the glyph shows the resolved
     theme (☀/☾) with a small "Auto" marker while following the system. */
  .car-theme-toggle {
    flex: 0 0 auto; align-self: flex-end; margin: 0 8px 6px 6px;
    display: inline-flex; align-items: center; gap: 6px;
    appearance: none; cursor: pointer; font: inherit; font-size: 13px; line-height: 1;
    color: var(--muted); background: transparent;
    border: 1px solid var(--border); border-radius: 999px; padding: 5px 10px;
    transition: color .12s, border-color .12s, background .12s;
  }
  .car-theme-toggle:hover { color: var(--fg); border-color: var(--accent); }
  .car-theme-toggle:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .car-theme-glyph { font-size: 15px; line-height: 1; }
  .car-theme-auto { font-size: 11px; text-transform: uppercase; letter-spacing: .04em; }
  /* FIX #350 — the LABELED theme control now lives in General → Admin → Appearance
     (the top-bar cycling toggle was removed from every viewport). A 3-way
     segmented radiogroup: System / Light / Dark. */
  .car-theme-seg {
    display: inline-flex; gap: 2px; flex: 0 0 auto;
    border: 1px solid var(--border); border-radius: 999px; padding: 2px;
  }
  .car-theme-seg-btn {
    appearance: none; background: transparent; color: var(--muted);
    border: 0; border-radius: 999px; padding: 5px 12px; font: inherit; font-size: 13px;
    cursor: pointer; white-space: nowrap; transition: color .12s, background .12s;
  }
  .car-theme-seg-btn:hover { color: var(--fg); }
  .car-theme-seg-btn-on { background: var(--accent); color: var(--on-accent); }
  .car-theme-seg-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  /* FIX #350 — the "⋯ more" overflow menu (holds tabs that don't fit the band). */
  .car-tabmore { position: relative; flex: 0 0 auto; align-self: flex-end; }
  .car-tabmore-btn { padding-left: 12px; padding-right: 12px; font-weight: 590; }
  .car-tabmore-menu {
    position: absolute; top: 100%; right: 0; z-index: 50; min-width: 168px;
    margin-top: 3px; padding: 4px; display: flex; flex-direction: column; gap: 1px;
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    box-shadow: 0 8px 24px rgba(0,0,0,.22);
  }
  .car-tabmore-item {
    appearance: none; background: transparent; border: 0; text-align: left;
    color: var(--fg); font: inherit; font-size: 13.5px; padding: 8px 12px;
    border-radius: 7px; cursor: pointer; white-space: nowrap;
  }
  .car-tabmore-item:hover { background: var(--hover-bg); }
  .car-tabmore-item-active { color: var(--accent); font-weight: 590; }
  .car-tabmore-item:focus-visible { outline: 2px solid var(--accent); outline-offset: -2px; }
  /* FIX #348 — mobile Work tab pulses a soft build-blue while a build runs. Uses
     the same `--phase-build-*` tokens as the desktop rail dot; reduced-motion
     drops to a static tint. Applied ONLY at mobile widths (gated in JS). */
  .car-tab-workpulse { color: var(--phase-build-fg); animation: car-tab-workpulse 2s ease-in-out infinite; }
  @keyframes car-tab-workpulse {
    0%, 100% { background: transparent; }
    50% { background: var(--phase-build-bg); }
  }
  @media (prefers-reduced-motion: reduce) {
    .car-tab-workpulse { animation: none; background: var(--phase-build-bg); }
  }
  /* FIX #350 — mobile stacks the top bar: the workspace title on its own line,
     the tab band on the row below (no more title/tabs competing for one row).
     Desktop (>=1024px) keeps the single-row layout. 1023.98px is the exact
     complement of the JS `(min-width: 1024px)` desktop breakpoint. */
  @media (max-width: 1023.98px) {
    .car-topbar { flex-direction: column; align-items: stretch; gap: 0; padding: 6px 8px 0; }
    .car-wsseat { padding: 4px 6px 6px; font-size: 15px; }
  }
  /* FIX #349 — mobile "job starting" top drawer: slides down from the top when a
     build kicks off, auto-retracts after ~3s, swipe-up / ✕ to dismiss. Rendered
     only on mobile (gated in JS); reduced-motion shows/hides without the slide.
     z-index above every in-tree overlay (highest existing is 40). */
  .car-jobdrawer {
    position: fixed; top: 0; left: 0; right: 0; z-index: 60;
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; padding-top: max(10px, env(safe-area-inset-top));
    background: var(--surface); border-bottom: 1px solid var(--border);
    box-shadow: 0 4px 16px rgba(0,0,0,.18);
    transform: translateY(-110%); transition: transform .3s var(--ease-out);
  }
  .car-jobdrawer-open { transform: translateY(0); }
  .car-jobdrawer-dot {
    flex: 0 0 auto; width: 9px; height: 9px; border-radius: 50%;
    background: var(--phase-build-fg); animation: cwb-pulse 2s ease-in-out infinite;
  }
  .car-jobdrawer-main { flex: 1 1 auto; min-width: 0; display: flex; flex-direction: column; gap: 1px; }
  .car-jobdrawer-title {
    font-size: 14px; font-weight: 590; color: var(--fg);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .car-jobdrawer-sub { font-size: 12px; color: var(--phase-build-fg); }
  .car-jobdrawer-x {
    flex: 0 0 auto; appearance: none; background: transparent; border: 0;
    color: var(--muted); font-size: 15px; line-height: 1; cursor: pointer; padding: 4px 6px;
  }
  .car-jobdrawer-x:hover { color: var(--fg); }
  @media (prefers-reduced-motion: reduce) {
    .car-jobdrawer { transition: none; }
    .car-jobdrawer-dot { animation: none; }
  }
  .car-tabpanels { flex: 1 1 auto; position: relative; min-height: 0; min-width: 0; display: flex; }
  .car-tabpanel { flex: 1 1 auto; min-height: 0; min-width: 0; display: flex; }
  .car-tabpanel[hidden] { display: none; }
  /* FIX #343 — each visited conversation is a persistent, individually-mounted
     surface; only the active one is shown (the rest keep their scroll/draft alive
     off-screen). The active surface flexes to fill the tab panel like the lone
     <main> used to; hidden ones collapse out of layout entirely. */
  .car-conv { flex: 1 1 auto; min-height: 0; min-width: 0; display: flex; }
  .car-conv[hidden] { display: none; }
  /* M1 polish (item 3+5) — the Chat view's inner layout. `.car-thread`
     (ThreadPrimitive.Root) is a flex COLUMN: a growing top row (`.car-chatstage`)
     holding the message column + the Work pane, then the full-width composer
     footer. So the composer spans the whole width (chat + pane) and the pane is
     LIFTED above it. `overflow: hidden` clips the panel while it's slid off-right. */
  .car-chatstage {
    flex: 1 1 auto; min-height: 0; min-width: 0; display: flex; position: relative; overflow: hidden;
  }
  .car-chatmain {
    flex: 1 1 auto; min-width: 0; min-height: 0; display: flex; flex-direction: column; position: relative;
  }
  .car-tab-frame { flex: 1 1 auto; width: 100%; height: 100%; border: 0; background: var(--bg); }
  .car-tab-placeholder {
    margin: auto; text-align: center; color: var(--muted); padding: 40px 20px;
  }
  .car-tab-placeholder-title { font-size: 20px; color: var(--fg); margin-bottom: 6px; }
  .car-tab-placeholder-sub { font-size: 14px; }
  /* ── M1 UX REDESIGN PR-4 (+ item 3+5 polish) — the desktop WORK slide-out pane ──
     The pane is a flex column INSIDE `.car-chatstage` (to the right of the message
     column, ABOVE the composer footer): a relative box whose width animates 0 →
     --pane-width so the chat column shrinks in lock-step (chat is NEVER overlaid).
     The panel (`.car-plans`) is an absolutely-positioned FLOATING card: flush
     right, inset top/bottom for breathing room, rounded LEFT corners, soft shadow —
     it reads as a panel that slid in next to the chat, not a wall. Closed =
     translated fully off-screen right + visibility:hidden (its controls leave the
     tab order); open = slid home. The rows INSIDE stay the flat PR-2 rows. */
  .car-plans-col {
    position: relative; flex: 0 0 auto; width: 0; min-width: 0; align-self: stretch;
    transition: width .32s var(--ease-out);
  }
  .car-plans-col.car-plans-open { width: var(--pane-width); }
  .car-plans {
    position: absolute; top: 16px; bottom: 16px; right: 0; width: var(--pane-width);
    display: flex; flex-direction: column; min-height: 0;
    background: var(--surface); border: 1px solid var(--border); border-right: 0;
    border-radius: 14px 0 0 14px; box-shadow: -18px 0 48px -24px rgba(0,0,0,.55);
    transform: translateX(100%); visibility: hidden;
    transition: transform .32s var(--ease-out), visibility 0s linear .32s;
    z-index: 4;
  }
  .car-plans-col.car-plans-open .car-plans {
    transform: none; visibility: visible;
    transition: transform .32s var(--ease-out);
  }
  /* Edge-handle — the ONLY manual open/close control (no toggle / no X / no close
     chevron). A thin vertical pill, vertically centered, always visible. Closed:
     sits at the window's right edge (the only way in). Open: rides to the panel's
     left seam. Keyboard-operable (it's a real <button> with an aria-label). */
  .car-plans-handle {
    position: absolute; top: 50%; right: 2px; transform: translateY(-50%);
    z-index: 6; width: 16px; height: 54px; padding: 0;
    display: grid; place-items: center; cursor: pointer; appearance: none; font: inherit;
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    color: var(--muted);
    transition: right .32s var(--ease-out), color .12s ease, background .12s ease;
  }
  .car-plans-col.car-plans-open .car-plans-handle { right: var(--pane-width); }
  .car-plans-handle:hover { color: var(--fg); background: var(--active-bg); }

  .car-plans-head {

  /* Sanitized markdown (react-markdown + remark-gfm) — shared by agent chat
     bubbles + the Documents viewer. Dark theme; tight vertical rhythm so a chat
     bubble doesn't balloon. */
  .car-md { color: inherit; overflow-wrap: anywhere; }
  .car-md > :first-child { margin-top: 0; }
  .car-md > :last-child { margin-bottom: 0; }
  .car-md p { margin: 0 0 8px; line-height: 1.4; }
  /* User-message bubble body (ChatApp `TextPart`, role=user) is a bare <p
     class="car-text">; without this rule it inherits the UA default
     margin-block:1em, which stacked on the 5px bubble padding rendered a
     one-line user bubble ~2x its text height (#141's padding-only fix touched
     only .car-bubble + .car-md p — the agent path — never this one). Zero the
     margin and match the agent paragraph line-height so a single-line message
     hugs its text. */
  .car-text { margin: 0; line-height: 1.4; }
  .car-md h1, .car-md h2, .car-md h3, .car-md h4 { margin: 14px 0 6px; line-height: 1.25; font-weight: 700; }
  .car-md h1 { font-size: 1.4em; } .car-md h2 { font-size: 1.25em; } .car-md h3 { font-size: 1.1em; }
  .car-md ul, .car-md ol { margin: 0 0 8px; padding-left: 20px; }
  /* FIX #358 — list items read as too loose (visible gap per bullet); a list is
     "one paragraph split into lines", so tighten toward that rhythm: no
     inter-item margin (the tight 0 0 8px on the *list itself* already separates
     it from surrounding text) and a slightly snugger line-height than body text. */
  .car-md li { margin: 0; line-height: 1.3; }
  .car-md li + li { margin-top: 1px; }
  .car-md li > input[type="checkbox"] { margin-right: 6px; }
  .car-md a { color: var(--accent); text-decoration: underline; }
  .car-md strong { font-weight: 700; }
  .car-md em { font-style: italic; }
  .car-md code {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: .9em;
    background: var(--code-bg); border-radius: 4px; padding: 1px 5px;
  }
  .car-md pre {
    background: var(--code-block-bg); border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 12px; overflow-x: auto; margin: 0 0 8px;
  }
  .car-md pre code { background: none; padding: 0; font-size: .85em; }
  /* FIX #359 — Telegram-style one-tap copy button, top-right of the code
     block. Hidden until hover/focus so it stays non-intrusive; `(hover: none)`
     (touch devices) keeps it always visible since there's no hover to reveal
     it. Matches the pill styling already used for `.car-theme-toggle`. */
  .car-md-pre-wrap { position: relative; }
  .car-md-copy {
    position: absolute; top: 6px; right: 6px;
    appearance: none; cursor: pointer; font: inherit; font-size: 11px; line-height: 1;
    color: var(--muted); background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; padding: 3px 8px; opacity: 0;
    transition: opacity .12s ease, color .12s ease, border-color .12s ease;
  }
  .car-md-pre-wrap:hover .car-md-copy, .car-md-copy:focus-visible { opacity: 1; }
  .car-md-copy:hover { color: var(--fg); border-color: var(--accent); }
  .car-md-copy:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  @media (hover: none) { .car-md-copy { opacity: 1; } }
  .car-md blockquote {
    margin: 0 0 8px; padding: 2px 0 2px 12px; border-left: 3px solid var(--border); color: var(--muted);
  }
  .car-md table { border-collapse: collapse; margin: 0 0 8px; display: block; overflow-x: auto; }
  .car-md th, .car-md td { border: 1px solid var(--border); padding: 4px 8px; text-align: left; }
  .car-md th { background: var(--hover-bg-weak); font-weight: 700; }
  .car-md hr { border: 0; border-top: 1px solid var(--border); margin: 12px 0; }
  .car-md img { max-width: 100%; border-radius: 6px; }
  /* Documents viewer markdown: scrollable, roomier line-height than chat. */

  /* WAVE 3 PR-5 — web Documents tab (list · viewer · comments). */
  .cdoc { display: flex; flex: 1 1 auto; min-height: 0; width: 100%; }
  /* Structured left nav (PR-5): Pinned → Recent → folder tree. Flat rows,

  .cdoc-side {

  .cdoc-view { flex: 1 1 auto; min-width: 0; display: flex; flex-direction: column; min-height: 0; }
  .cdoc-view-head {

  }

  .cdoc-edit-btn, .cdoc-view-toggle {

    border-radius: 8px; padding: 5px 12px; font: inherit; font-size: 13px; cursor: pointer; flex: 0 0 auto;
  }

    color: var(--fg); user-select: text;

    color: var(--fg); background: var(--bg); border: 0; border-bottom: 1px solid var(--border); outline: none;
  }

  .cdoc-comments-error { color: var(--error-fg); font-size: 12px; padding: 6px 8px; }
  .cdoc-composer, .cdoc-reply-box {
    flex: 0 0 auto; border-top: 1px solid var(--border); padding: 10px 14px; background: var(--surface);
  }
  .cdoc-composer-excerpt { font-size: 12px; color: var(--muted); margin-bottom: 6px; font-style: italic; }
  .cdoc-composer-input {
    width: 100%; resize: vertical; background: var(--bg); color: var(--fg);
    border: 1px solid var(--border); border-radius: 8px; padding: 8px; font: inherit; font-size: 13px;
  }
  .cdoc-composer-actions { display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; }
  .cdoc-btn {
    appearance: none; border: 1px solid var(--border); background: transparent; color: var(--fg);
    border-radius: 8px; padding: 5px 11px; font: inherit; font-size: 12px; cursor: pointer;
  }
  .cdoc-btn:disabled { opacity: .45; cursor: default; }
  .cdoc-btn-primary { background: var(--accent); color: var(--on-accent); border-color: var(--accent); font-weight: 600; }
  .cdoc-thread { border: 1px solid var(--border); border-radius: 10px; margin-bottom: 8px; overflow: hidden; }
  .cdoc-thread-resolved { opacity: .6; }
  .cdoc-thread-head {

    border: 0; color: var(--fg); padding: 9px 11px; font: inherit; cursor: pointer;

  .cdoc-thread-head:hover { background: var(--hover-bg-weak); }
  .cdoc-thread-anchor { font-size: 11px; color: var(--accent); margin-bottom: 4px; font-style: italic; }
  .cdoc-thread-root { display: flex; flex-direction: column; gap: 2px; }
  .cdoc-thread-author { font-size: 12px; font-weight: 600; color: var(--muted); }

  .cdoc-reply-box { border-top: 0; padding: 6px 0 0; background: transparent; }
  .cdoc-resolved-head { font-size: 11px; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin: 10px 0 6px; padding: 0 4px; }
  @media (max-width: 720px) {

  /* ── Tasks tab (WAVE 3 PR-8) ── */
  .ctask { display: flex; flex-direction: column; flex: 1 1 auto; min-height: 0; width: 100%; }
  .ctask-head {
    display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
    padding: 10px 14px; border-bottom: 1px solid var(--border); background: var(--surface);
  }
  .ctask-filters { display: flex; gap: 4px; }
  .ctask-filter {
    background: transparent; color: var(--muted); border: 1px solid var(--border);
    border-radius: 999px; padding: 4px 12px; font-size: 12px; cursor: pointer;
  }
  .ctask-filter:hover { color: var(--fg); }
  .ctask-filter-active { color: var(--fg); border-color: var(--accent); background: var(--accent-tint); }
  .ctask-add { display: flex; gap: 6px; flex: 1 1 240px; min-width: 200px; }
  .ctask-add-input {
    flex: 1 1 auto; min-width: 0; background: var(--bg); color: var(--fg);
    border: 1px solid var(--border); border-radius: 8px; padding: 6px 10px; font-size: 14px;
  }

  .ctask-list { flex: 1 1 auto; min-height: 0; overflow-y: auto; padding: 8px 14px; }
  .ctask-empty { color: var(--muted); font-size: 13px; padding: 24px 14px; text-align: center; }

    display: flex; align-items: flex-start; gap: 10px;
    border: 1px solid var(--border); border-radius: 10px; padding: 8px 10px; background: var(--surface);
  }
  .ctask-row-done { opacity: .55; }
  .ctask-rank { flex: 0 0 34px; font-size: 13px; font-weight: 600; color: var(--accent); padding-top: 2px; text-align: right; }
  .ctask-main { flex: 1 1 auto; min-width: 0; display: flex; flex-direction: column; gap: 3px; }
  .ctask-title-line { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .ctask-title { font-size: 14px; color: var(--fg); word-break: break-word; }
  .ctask-row-done .ctask-title { text-decoration: line-through; }
  .ctask-chip { font-size: 10px; padding: 1px 6px; border-radius: 999px; border: 1px solid var(--border); color: var(--muted); white-space: nowrap; }
  .ctask-chip-prio { color: var(--warn-fg); border-color: var(--warn-border); }
  .ctask-chip-due { color: var(--accent); border-color: var(--accent-border); }
  .ctask-reason { font-size: 12px; color: var(--muted); font-style: italic; }
  .ctask-actions { display: flex; gap: 4px; align-items: center; flex-shrink: 0; flex-wrap: wrap; }
  .ctask-btn {

    border-radius: 8px; padding: 4px 10px; font-size: 12px; cursor: pointer;
  }
  .ctask-btn:hover { border-color: var(--accent); }
  .ctask-btn:disabled { opacity: .4; cursor: default; }
  .ctask-btn-icon { padding: 4px 7px; line-height: 1; font-size: 10px; }
  .ctask-btn-primary { background: var(--accent); color: var(--on-accent); border-color: var(--accent); font-weight: 600; }
  /* ── Work Board tab (cwb-) — flat one-line rows, NOT cards (distinct from
     ctask). Reuses --accent (#6cf live-blue), --muted, --border, car-blink. ── */
  .cwb { display: flex; flex-direction: column; flex: 1 1 auto; min-height: 0; width: 100%; }
  /* #344 — the add-something-to-do composer sits IN-FLOW at the bottom of the
     active items, above the "Done · N" disclosure (it used to be a pinned footer
     below Done). Quiet vertical padding seats it between the list and Done. */
  .cwb-add { display: flex; gap: 6px; align-items: center; padding: 10px 6px 4px; }
  .cwb-add-input {
    flex: 1 1 auto; min-width: 0; background: var(--bg); color: var(--fg);
    border: 1px solid var(--border); border-radius: 8px; padding: 6px 10px; font-size: 14px;
  }
  .cwb-error { color: var(--error-fg); font-size: 12px; padding: 6px 14px; }
  .cwb-list { flex: 1 1 auto; min-height: 0; overflow-y: auto; padding: 6px 8px; }
  .cwb-empty { color: var(--muted); font-size: 13px; padding: 24px 14px; text-align: center; }
  .cwb-empty-zero { padding: 40px 24px; }
  .cwb-ul { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; }
  /* M1 redesign polish (item 4) — a row is a 2-LINE stack: line 1 = dot + title +
     hover actions; line 2 = the muted phase tag + round. Line 2 renders ONLY when
     the item has a bound run to report — a bare queued card is single-line. */
  .cwb-row {
    display: flex; flex-direction: column; gap: 1px;
    min-height: 34px; padding: 3px 8px; border-radius: 8px;
  }
  .cwb-row-line1 { display: flex; align-items: center; gap: 8px; min-height: 28px; }
  /* line 2 — indented under the title (past the 9px dot + 8px gap), smaller + muted. */
  .cwb-row-meta { display: flex; align-items: center; gap: 6px; margin-left: 17px; padding-bottom: 1px; }
  .cwb-row:hover { background: var(--hover-bg); }
  /* status dot — fixed-width leftmost column; a clickable button that advances. */
  .cwb-dot {
    flex: 0 0 auto; width: 9px; height: 9px; border-radius: 50%; padding: 0;
    border: 1.5px solid var(--muted); background: transparent; cursor: pointer;
  }
  .cwb-dot:disabled { cursor: default; }
  /* M1 redesign — the leading dot reflects the build lifecycle. Not-started is a
     faint gray outline; running steps fill + PULSE in the phase's tag colour;
     failed is a solid red; done is a solid green. (Replaces the old blink + the
     ⑂/› activity glyph column — the dot + tag now carry that signal.) */
  .cwb-dot-upcoming { border-color: var(--muted); background: transparent; }
  .cwb-dot-build   { border-color: var(--phase-build-fg);  background: var(--phase-build-fg); }
  .cwb-dot-review  { border-color: var(--phase-review-fg); background: var(--phase-review-fg); }
  .cwb-dot-fix     { border-color: var(--phase-fix-fg);    background: var(--phase-fix-fg); }
  .cwb-dot-merge   { border-color: var(--phase-merged-fg); background: var(--phase-merged-fg); }
  .cwb-dot-failed  { border-color: var(--phase-failed-fg); background: var(--phase-failed-fg); }
  .cwb-dot-done    { border-color: var(--success-fg);      background: var(--success-fg); }
  .cwb-dot-pulse   { animation: cwb-pulse 2s ease-in-out infinite; }
  @keyframes cwb-pulse { 0%, 100% { opacity: 1; } 50% { opacity: .4; } }
  /* Phase TAG — a small typographic capsule (sentence-case), tinted bg + colored
     fg, no border, no emoji. Sits trailing before the round + hover actions. */
  .cwb-tag {
    flex: 0 0 auto; font-size: 11px; font-weight: 600; line-height: 1;
    padding: 3px 8px; border-radius: 999px; white-space: nowrap;
  }
  .cwb-tag-build  { color: var(--phase-build-fg);  background: var(--phase-build-bg); }
  .cwb-tag-review { color: var(--phase-review-fg); background: var(--phase-review-bg); }
  .cwb-tag-fix    { color: var(--phase-fix-fg);    background: var(--phase-fix-bg); }
  .cwb-tag-merge  { color: var(--phase-merged-fg); background: var(--phase-merged-bg); }
  .cwb-tag-failed { color: var(--phase-failed-fg); background: var(--phase-failed-bg); }
  /* round N — muted, next to the tag. No elapsed-minutes timer (M1: dropped). */
  .cwb-round { flex: 0 0 auto; font-size: 11px; color: var(--muted); white-space: nowrap; }
  /* failure-reason one-liner (#340) — muted, single-line, truncates; full text on hover. */
  .cwb-fail-reason { flex: 1 1 auto; min-width: 0; font-size: 11px; color: var(--phase-failed-fg); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  /* FIX #341 — drag handle: bare ⠿ grip-dots, NO border/button chrome, so it
     reads as a draggable grip rather than a third action button beside ▶/✕.
     Muted (`--faint`, brightening to `--muted` on hover) with a grab/grabbing
     cursor. It is a <button> (keyboard-reorder a11y), so reset its default chrome. */
  .cwb-drag {
    background: transparent; border: 0; margin: 0; padding: 2px 4px;
    color: var(--faint); font-size: 13px; line-height: 1; cursor: grab;
  }
  .cwb-drag:hover:not(:disabled) { color: var(--muted); }
  .cwb-drag:active { cursor: grabbing; }
  .cwb-drag:disabled { opacity: .35; cursor: default; }
  .cwb-row-dragging { opacity: .45; }
  .cwb-row-dragover { background: var(--accent-tint); }
  .cwb-title {
    flex: 1 1 auto; min-width: 0; font-size: 14px; color: var(--fg);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .cwb-title-btn { background: transparent; border: 0; text-align: left; cursor: text; font: inherit; padding: 2px 0; }
  /* title + spec-doc link stacked in the middle column. */
  .cwb-title-col { flex: 1 1 auto; min-width: 0; display: flex; flex-direction: column; gap: 1px; }
  .cwb-title-col .cwb-title { flex: 0 0 auto; }
  /* card ▸ spec-doc link (M1) — a compact tappable link under the title. */
  .cwb-doc-link {
    align-self: flex-start; max-width: 100%; background: transparent; border: 0;
    padding: 0; margin: 0; font: inherit; font-size: 11px; line-height: 1.2;
    color: var(--accent); cursor: pointer; text-align: left;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .cwb-doc-link:hover { text-decoration: underline; }
  .cwb-doc-link-static { color: var(--muted); cursor: default; }
  .cwb-edit-input {
    flex: 1 1 auto; min-width: 0; background: var(--bg); color: var(--fg);
    border: 1px solid var(--accent); border-radius: 6px; padding: 3px 8px; font-size: 14px;
  }
  .cwb-date { flex: 0 0 auto; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 11px; color: var(--muted); }
  .cwb-actions { flex: 0 0 auto; display: flex; gap: 2px; align-items: center; opacity: 0; transition: opacity .12s; }
  .cwb-row:hover .cwb-actions, .cwb-row:focus-within .cwb-actions { opacity: 1; }
  .cwb-btn {
    background: transparent; color: var(--fg); border: 1px solid var(--border);
    border-radius: 6px; padding: 3px 8px; font-size: 12px; cursor: pointer;
  }
  .cwb-btn:hover { border-color: var(--accent); }
  .cwb-btn:disabled { opacity: .35; cursor: default; }
  .cwb-btn-icon { padding: 2px 6px; line-height: 1; font-size: 10px; }
  /* ▶ start/retry — always visible (not hover-gated like the ▲▼✕ actions) so a
     startable card advertises it; accent-tinted to read as the primary action. */
  .cwb-btn-play {
    flex: 0 0 auto; margin-left: 4px; color: var(--accent); border-color: var(--border);
  }
  .cwb-btn-play:hover:not(:disabled) { border-color: var(--accent); background: var(--accent); color: var(--on-accent); }
  .cwb-btn-primary { background: var(--accent); color: var(--on-accent); border-color: var(--accent); font-weight: 600; }
  .cwb-btn-danger { background: var(--error-fg); color: #fff; border-color: transparent; font-weight: 600; }
  /* delete-confirm (M1 polish item 2) — an INLINE strip within the row's own line 1
     (no backdrop / no modal / no screen takeover). A short prompt + Cancel + a
     destructive Remove, pushed to the right where the hover actions sat. */
  .cwb-confirm-inline { display: inline-flex; align-items: center; gap: 6px; margin-left: auto; }
  .cwb-confirm-inline-msg { font-size: 12px; color: var(--muted); white-space: nowrap; }
  .cwb-row-done { opacity: .55; }
  .cwb-row-done .cwb-title { text-decoration: line-through; }
  /* completed disclosure — collapsed at the bottom, its own scroll region. */
  .cwb-completed { margin-top: 8px; border-top: 1px solid var(--border); padding-top: 6px; }
  .cwb-completed-toggle {
    display: flex; align-items: center; gap: 6px; width: 100%;
    background: transparent; color: var(--muted); border: 0; cursor: pointer;
    font-size: 12px; text-transform: uppercase; letter-spacing: .05em; padding: 6px 8px;
  }
  .cwb-completed-toggle:hover { color: var(--fg); }
  .cwb-completed-caret { display: inline-block; width: 10px; }
  .cwb-completed-ul { max-height: 40vh; overflow-y: auto; }
  /* one-shot flash when a row's snapshot changes; reduced-motion turns it off. */
  @keyframes cwb-flash { from { background: var(--accent-flash); } to { background: transparent; } }
  @media (prefers-reduced-motion: reduce) {
    .cwb-dot-pulse { animation: none; }
    .cwb-flash { animation: none; }
  }
  /* ── Project rail (rail-redesign) ──────────────────────────────────────────
     A cleaner, more tactile left column: emoji "avatar" chips give every row a
     visual anchor (like app icons), the label sits in a medium weight, an
     accent-lit pill marks the active project, and a Telegram-style count pill
     shows unread activity. A row with unread activity reads bolder to draw the
     eye. Entirely theme-var-driven, so it reskins with the #153 light/dark
     toggle with zero hardcoded colours. */
  .car-rail {
    width: 288px;
    flex: 0 0 288px;
    border-right: 1px solid var(--border);
    background: var(--surface);
    padding: 14px 8px 10px;
    overflow-y: auto;
    /* Flex column so the Create Project button pins to the bottom (margin-top:auto). */
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  /* ⚛ Neutron branding lockup (M1 UX redesign) — replaces the "PROJECTS" caps
     label: an accent-lit atom mark + the wordmark, with the new-project "+" on
     the right of the header. */
  .car-rail-head {
    display: flex; align-items: center; gap: 9px; padding: 1px 4px 10px;
  }
  .car-rail-atom { flex: 0 0 20px; width: 20px; height: 20px; color: var(--accent); }
  .car-rail-wordmark {
    font-size: 16px; font-weight: 700; letter-spacing: -.01em; color: var(--fg);
  }
  .car-rail-newp {
    margin-left: auto; flex: 0 0 auto; appearance: none; background: transparent;
    color: var(--muted); border: 0; cursor: pointer; padding: 0;
    width: 26px; height: 26px; display: inline-flex; align-items: center; justify-content: center;
    font-size: 21px; line-height: 1; border-radius: 7px;
    transition: color .12s ease, background .12s ease;
  }
  .car-rail-newp:hover:not(:disabled) { background: var(--hover-bg); color: var(--fg); }
  .car-rail-newp:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }
  .car-rail-newp:disabled { opacity: .5; cursor: default; }
  .car-rail-list { display: flex; flex-direction: column; gap: 1px; }
  /* Telegram-style 2-line row: [avatar 40px] · [name + time / preview + unread]. */
  .car-rail-item {
    display: grid; grid-template-columns: 40px 1fr; gap: 10px; align-items: center;
    width: 100%; text-align: left; min-height: 56px;
    background: transparent; color: var(--fg); border: 0; border-radius: 10px;
    padding: 8px; cursor: pointer; font: inherit;
    transition: background .14s ease, transform .06s ease;
  }
  .car-rail-item:hover { background: var(--hover-bg); }
  .car-rail-item:active { transform: scale(.985); }
  .car-rail-item:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }
  .car-rail-item-active { background: var(--active-bg); }
  /* Avatar slot — plain emoji glyph (Telegram-style, no chip) + a corner
     work-activity dot pinned bottom-right with a surface-coloured ring. */
  .car-rail-avatar {
    position: relative; width: 40px; height: 40px;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .car-rail-emoji { font-size: 22px; line-height: 1; }
  .car-rail-dot {
    position: absolute; right: 1px; bottom: 1px;
    width: 8px; height: 8px; border-radius: 50%;
    box-shadow: 0 0 0 2px var(--surface);
  }
  /* FIX #335 — a working project's rail dot MATCHES the work-list building dot
     exactly: the building blue (`--phase-build-fg`, NOT the separate `--work`
     token) with the shared `cwb-pulse` (opacity 1→.4→1, 2s). `attention` stays a
     STATIC amber (`--attention`) reserved for a genuine stall/failed-not-done. */
  .car-rail-dot-work { background: var(--phase-build-fg); animation: cwb-pulse 2s ease-in-out infinite; }
  .car-rail-dot-attention { background: var(--attention); }
  @media (prefers-reduced-motion: reduce) { .car-rail-dot-work { animation: none; } }
  .car-rail-meta { min-width: 0; }
  .car-rail-line1 { display: flex; align-items: baseline; gap: 8px; }
  .car-rail-name {
    flex: 1 1 auto; min-width: 0; font-size: 15px; font-weight: 590; color: var(--fg);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .car-rail-item-unread .car-rail-name { font-weight: 700; }
  .car-rail-time {
    flex: 0 0 auto; margin-left: auto; font-size: 12px; color: var(--muted);
    font-variant-numeric: tabular-nums; white-space: nowrap;
  }
  .car-rail-line2 { display: flex; align-items: center; gap: 8px; margin-top: 2px; }
  .car-rail-preview {
    flex: 1 1 auto; min-width: 0; font-size: 13px; color: var(--muted);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .car-rail-item-unread .car-rail-preview { color: var(--fg-2); }
  .car-rail-you { color: var(--faint); }
  /* Unread count pill, right-aligned on line 2. */
  .car-rail-badge {
    flex: 0 0 auto; margin-left: auto;
    min-width: 18px; height: 18px; padding: 0 5px; box-sizing: border-box;
    display: inline-flex; align-items: center; justify-content: center;
    background: var(--work); color: var(--on-accent);
    font-size: 11px; font-weight: 700; line-height: 1; border-radius: 9px;
  }
  /* <1200px — the rail collapses to a 68px icon rail: avatar + corner dot + a
     small count badge overlapping the top-right; names live in the row `title`.
     Driven by the JS `narrow` render branch (also PR-4's auto-collapse hook). */
  .car-rail-narrow { width: 68px; flex-basis: 68px; padding: 12px 8px 10px; align-items: center; }
  .car-rail-narrow .car-rail-head { justify-content: center; padding: 1px 0 12px; }
  .car-rail-narrow .car-rail-wordmark { display: none; }
  .car-rail-narrow .car-rail-newp { margin-left: 0; }
  .car-rail-narrow .car-rail-list { align-items: center; }
  .car-rail-item-narrow {
    grid-template-columns: 40px; justify-items: center; min-height: 48px;
    padding: 6px; position: relative;
  }
  /* Corner count badge overlapping the avatar's top-right (narrow rail only). */
  .car-rail-count {
    position: absolute; top: 2px; right: 6px;
    min-width: 16px; height: 16px; padding: 0 4px; box-sizing: border-box;
    display: inline-flex; align-items: center; justify-content: center;
    background: var(--work); color: var(--on-accent);
    font-size: 10px; font-weight: 700; line-height: 1; border-radius: 8px;
    box-shadow: 0 0 0 2px var(--surface);
  }
  /* Flows directly under the last project row (Ryan 2026-07-02 — was pinned to the rail bottom). */
  .car-rail-create {
    width: 100%; text-align: left;
    background: transparent; color: var(--accent); border: 1px dashed var(--border);
    border-radius: 10px; padding: 9px 11px; cursor: pointer; font: inherit; font-size: 14px;
    transition: background .14s ease, border-color .14s ease;
  }
  .car-rail-create:hover:not(:disabled) { background: var(--accent-tint-weak); border-color: var(--accent); }
  .car-rail-create:disabled { opacity: .6; cursor: default; }
  /* Inline create-project form (replaces the native window.prompt). Flows under the last project. */
  .car-rail-create-form { display: flex; flex-direction: column; gap: 6px; }
  .car-rail-input {
    width: 100%; box-sizing: border-box; font: inherit;
    background: var(--bg); color: var(--fg);
    border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; outline: none;
  }
  .car-rail-input:focus { border-color: var(--accent); }
  .car-rail-create-error { color: var(--error-fg); font-size: 12px; padding: 0 2px; }
  .car-rail-create-actions { display: flex; gap: 6px; justify-content: flex-end; }
  .car-rail-create-cancel, .car-rail-create-confirm {
    font-size: 12px; padding: 4px 10px; border-radius: 8px; cursor: pointer; font: inherit;
    border: 1px solid var(--border); background: var(--surface, rgba(255,255,255,0.04)); color: inherit;
  }
  .car-rail-create-confirm { border-color: var(--accent); color: var(--accent); }
  .car-rail-create-cancel:disabled, .car-rail-create-confirm:disabled { opacity: .6; cursor: default; }
  /* The rail is the sole project navigation (persistent left column). On narrow
     viewports it collapses to the 68px icon rail above (`.car-rail-narrow`, a JS
     render branch) rather than hiding, so project switching survives everywhere. */
  /* position: relative anchors the full-surface drag-and-drop overlay (BUG 2+4). */
  .car-main { position: relative; flex: 1 1 auto; display: flex; flex-direction: column; min-width: 0; }
  /* Subtle drag feedback for a PLAIN image drag (no import affordance) — the
     import drag gets the prominent .car-dropzone overlay instead (Codex r1). */
  .car-main.car-dragover { outline: 2px dashed var(--accent); outline-offset: -4px; }
  .car-banner {
    text-align: center; font-size: 13px; padding: 6px 12px;
    background: var(--banner-warn-bg); color: var(--banner-warn-fg); border-bottom: 1px solid var(--border);
  }
  .car-banner-connecting, .car-banner-reconnecting { background: var(--banner-info-bg); color: var(--banner-info-fg); }
  .car-banner-closed { background: var(--banner-error-bg); color: var(--banner-error-fg); }
  .car-thread { position: relative; flex: 1 1 auto; display: flex; flex-direction: column; min-height: 0; }
  .car-viewport { flex: 1 1 auto; overflow-y: auto; padding: 18px 16px 8px; display: flex; flex-direction: column; gap: 10px; }
  .car-empty { margin: auto; text-align: center; color: var(--muted); }
  .car-empty-title { font-size: 22px; color: var(--fg); margin-bottom: 6px; }
  /* BUG 1 — each row is a centered, column-width flex container: the user bubble
     right-aligns within it, the agent bubble left-aligns, and the whole column
     sits centered on wide screens (width:100% collapses the auto margins on mobile). */
  .car-row { display: flex; gap: 8px; align-items: flex-end; width: 100%; max-width: var(--chat-col); margin-left: auto; margin-right: auto; }
  .car-row-user { justify-content: flex-end; }
  .car-row-agent { justify-content: flex-start; }
  .car-avatar {
    flex: 0 0 28px; width: 28px; height: 28px; border-radius: 50%;
    background: var(--agent-avatar-bg); color: var(--fg);
    display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600;
  }
  /* BUG 2 — tight bubbles matching the old vanilla chat: a ~60ch readable cap,
     a 4ch floor so a one-word reply doesn't collapse to a sliver, and snug
     8px/13px padding. */
  .car-bubble {
    max-width: min(60ch, 80%);
    min-width: 4ch;
    padding: 5px 13px; border-radius: var(--bubble-radius);
    white-space: pre-wrap; word-wrap: break-word; overflow-wrap: anywhere;
  }
  .car-bubble-user { background: var(--user-bubble); color: var(--user-fg); border-bottom-right-radius: 4px; }
  .car-bubble-agent { background: var(--agent-bubble); color: var(--agent-fg); border-bottom-left-radius: 4px; }
  .car-bubble img { max-width: 100%; border-radius: 12px; display: block; margin-top: 6px; }
  /* FIX #338 — subtle per-message timestamp (iMessage/Telegram-style). Inherits
     the bubble's own fg via currentColor (legible on both the tinted user bubble
     and the agent bubble) at low opacity; hovering shows the full date (title
     tooltip). FIX #346 — pinned to the BOTTOM-RIGHT of EVERY bubble regardless of
     role (grey assistant AND blue user), so the timestamp sits in one consistent
     spot instead of flipping side with the bubble's alignment. */
  .car-time {
    display: block; margin-top: 2px; font-size: 10px; line-height: 1;
    opacity: .55; font-variant-numeric: tabular-nums; cursor: default;
    text-align: right;
  }
  /* FIX #338 — centered "Today / Yesterday / Mon Jul 1" day divider between
     messages when the calendar day changes; hairline rules flank the label. */
  .car-day-divider {
    display: flex; align-items: center; gap: 10px;
    width: 100%; max-width: var(--chat-col); margin: 12px auto 6px;
    color: var(--muted); font-size: 11px; font-weight: 600;
  }
  .car-day-divider::before, .car-day-divider::after {
    content: ''; flex: 1 1 auto; height: 1px; background: var(--border);
  }
  .car-day-divider span { flex: 0 0 auto; }
  .car-typing { display: inline-flex; gap: 4px; align-items: center; }
  .car-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); animation: car-blink 1.4s infinite both; }
  /* M1 UX REDESIGN — quiet centered SYSTEM-notification pill (cold-start
     "Waking up…", quota). NOT a chat bubble — small, muted, a tiny spinner + short
     text. Reserved for genuine notifications; errors stay chat bubbles. */
  .car-system-pill {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    margin: 6px auto; max-width: var(--chat-col); padding: 5px 12px;
    font-size: 12px; color: var(--muted);
  }
  .car-system-pill-spinner {
    width: 11px; height: 11px; flex: 0 0 auto; border-radius: 50%;
    border: 2px solid var(--border); border-top-color: var(--muted);
    animation: car-spin 0.8s linear infinite;
  }
  .car-system-pill-text { min-width: 0; }
  @keyframes car-spin { to { transform: rotate(360deg); } }
  @media (prefers-reduced-motion: reduce) { .car-system-pill-spinner { animation: none; } }
  .car-dot:nth-child(2) { animation-delay: .2s; }
  .car-dot:nth-child(3) { animation-delay: .4s; }
  @keyframes car-blink { 0%, 80%, 100% { opacity: .25; } 40% { opacity: 1; } }
  /* BUG 1 — keep the queued/receipt status lines aligned to the centered column. */
  .car-pending { text-align: center; font-size: 12px; color: var(--muted); padding: 4px; max-width: var(--chat-col); margin: 0 auto; }
  /* Track B Phase 4 — delivery/read receipt status line for the latest send. */
  .car-receipt { text-align: right; font-size: 11px; color: var(--muted); padding: 2px 14px; max-width: var(--chat-col); margin: 0 auto; }
  .car-receipt-read { color: var(--accent); }
  /* Track B Phase 4 — per-message emoji reaction chips.
     BUG 5 (2026-06-29) — Ryan doesn't want reactions: the "＋" add trigger +
     emoji picker are no longer rendered, so a message with no reactions shows no
     reaction UI at all. Only existing chips (e.g. an agent-set reaction) render;
     the add-affordance + picker styles were removed with the markup. */
  .car-reactions { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 0; align-items: center; }
  .car-reaction {
    font-size: 12px; line-height: 1; margin-top: 6px; padding: 3px 8px; border-radius: 11px;
    border: 1px solid var(--border); background: var(--surface, rgba(255,255,255,0.04));
    color: inherit; cursor: pointer;
  }
  .car-reaction-self { border-color: var(--accent); color: var(--accent); }
  /* P1b — onboarding / quick-reply button rows + image gallery. */
  .car-choices { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .car-choice {
    font: inherit; font-size: 13px; line-height: 1.2; font-weight: 500; text-align: left;
    padding: 7px 12px; border-radius: 10px; cursor: pointer;
    border: 1px solid var(--border); background: var(--surface, rgba(255,255,255,0.04)); color: inherit;
  }
  .car-choice:hover { border-color: var(--accent); }
  .car-choice-primary { background: var(--accent); color: var(--user-fg, #04121f); border-color: var(--accent); font-weight: 600; }
  .car-choice-destructive { background: transparent; border-color: var(--danger, #e5534b); color: var(--danger, #e5534b); }
  .car-choices-chosen { margin-top: 8px; font-size: 13px; color: var(--muted); }
  .car-gallery-wrap { margin-top: 8px; }
  .car-gallery { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .car-gallery-tile {
    position: relative; display: block; padding: 0; overflow: hidden; cursor: pointer;
    border-radius: 10px; border: 1px solid var(--border); background: var(--surface, rgba(255,255,255,0.04));
  }
  .car-gallery-tile:hover { border-color: var(--accent); }
  .car-gallery-img { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; }
  .car-gallery-label {
    position: absolute; left: 0; right: 0; bottom: 0; padding: 4px 8px; text-align: left;
    font-size: 12px; font-weight: 600; color: var(--gallery-label-fg); background: var(--gallery-label-bg);
  }
  /* BUG 3/4 — history-import status above the composer: the one-shot upload
     banner AND the live `import_progress` indicator (spinner + body + bar).
     Centered to the chat column (BUG 1). */
  .car-import-status {
    font-size: 12px; padding: 8px 12px; margin: 6px auto 0; max-width: var(--chat-col); border-radius: 8px;
    border: 1px solid var(--border); background: var(--bg); color: var(--muted);
    display: flex; flex-direction: column; gap: 6px;
  }
  .car-import-uploading { color: var(--info-fg); border-color: var(--info-border); }
  .car-import-done { color: var(--success-fg); border-color: var(--success-border); }
  .car-import-error { color: var(--error-fg); border-color: var(--error-border); }
  /* BUG 3 — live progress: spinner + body line + a thin determinate bar. */
  .car-import-row { display: flex; align-items: center; gap: 8px; }
  .car-import-body { flex: 1 1 auto; min-width: 0; }
  .car-spinner {
    flex: 0 0 auto; width: 13px; height: 13px; border-radius: 50%;
    border: 2px solid var(--info-ring); border-top-color: var(--info-fg);
    animation: car-spin 0.8s linear infinite;
  }
  @keyframes car-spin { to { transform: rotate(360deg); } }
  .car-import-bar { display: block; height: 4px; border-radius: 999px; background: var(--info-track); overflow: hidden; }
  .car-import-bar-fill { display: block; height: 100%; background: var(--info-fg); border-radius: 999px; transition: width .4s ease; }
  /* BUG 2+4 — the prominent drag-and-drop overlay (web counterpart of
     app/components/DropZoneOverlay.tsx). Full-surface tinted scrim + dashed frame,
     shown only while dragging a file with an active import affordance. */
  .car-dropzone {
    position: absolute; inset: 0; z-index: 40; display: flex; align-items: center; justify-content: center;
    padding: 24px; background: var(--scrim); animation: car-fade .12s ease;
  }
  @keyframes car-fade { from { opacity: 0; } to { opacity: 1; } }
  .car-dropzone-frame {
    width: 100%; max-width: 480px; border-radius: 14px; border: 2px dashed var(--accent);
    background: var(--dropzone-frame-bg); padding: 28px 24px; text-align: center;
    display: flex; flex-direction: column; gap: 8px;
  }
  .car-dropzone-title { font-size: 18px; font-weight: 600; color: var(--fg); }
  .car-dropzone-hint { font-size: 13px; color: var(--muted); }
  /* BUG 1 — fresh-onboarding auto-start loader (matches the old chat's
     "Setting things up…"). The typing dots sit inline before the label. */
  .car-empty-loading { display: inline-flex; align-items: center; gap: 8px; }
  /* Track B Phase 4 — message edit/delete: edited marker, actions, inline editor. */
  .car-edited { font-size: 11px; opacity: 0.55; margin-top: 2px; display: inline-block; }
  /* BUG 5 — Edit/Delete are NOT always-on clutter under every bubble. On
     HOVER-CAPABLE pointer devices (desktop) they're invisible at rest and
     revealed on row hover/focus, like iMessage's secondary actions. We use
     opacity (NOT display:none) so the buttons stay in the tab order and keyboard
     focus both reaches AND reveals them (`:focus-within`). On touch / no-hover
     devices there is no hover to reveal them, so they stay visible — never
     unreachable (a11y, per cross-model review). (The reaction "＋" trigger was
     removed entirely — Ryan doesn't want reactions on web.) */
  .car-msg-actions { display: flex; gap: 8px; margin-top: 4px; }
  @media (hover: hover) and (pointer: fine) {
    .car-msg-actions { opacity: 0; pointer-events: none; transition: opacity 0.12s ease; }
    .car-row:hover .car-msg-actions,
    .car-row:focus-within .car-msg-actions { opacity: 1; pointer-events: auto; }
    .car-msg-action:focus { opacity: 1; }
  }
  .car-msg-action {
    font-size: 11px; background: none; border: none; cursor: pointer;
    color: var(--muted, #888); padding: 0; opacity: 0.7;
  }
  .car-msg-action:hover { opacity: 1; text-decoration: underline; }
  .car-msg-action-danger:hover { color: var(--danger, #e5534b); }
  /* W5 GAP-4 — a failed send's retry affordance (always visible, not hover-gated,
     so a stuck send is never hidden). Mirrors the mobile ⚠️ 'failed' glyph. */
  .car-msg-failed {
    display: inline-flex; align-items: center; gap: 4px; margin-top: 4px;
    font-size: 11px; background: none; border: none; cursor: pointer; padding: 0;
    color: var(--danger, #e5534b);
  }
  .car-msg-failed:hover { text-decoration: underline; }
  .car-edit { display: flex; flex-direction: column; gap: 6px; margin-top: 4px; }
  .car-edit-input {
    width: 100%; min-height: 48px; resize: vertical; font: inherit;
    border-radius: 8px; border: 1px solid var(--border); background: var(--surface, rgba(255,255,255,0.04));
    color: inherit; padding: 6px 8px;
  }
  .car-edit-actions { display: flex; gap: 6px; justify-content: flex-end; }
  .car-edit-btn {
    font-size: 12px; padding: 3px 10px; border-radius: 8px; cursor: pointer;
    border: 1px solid var(--border); background: var(--surface, rgba(255,255,255,0.04)); color: inherit;
  }
  .car-edit-save { border-color: var(--accent); color: var(--accent); }
  /* Anchored to `.car-chatmain` (the message column) — the composer is now a
     sibling footer BELOW that column, so the button sits just above the messages'
     bottom edge (16px), not lifted to clear an in-column composer. */
  .car-scroll-bottom {
    position: absolute; right: 16px; bottom: 16px; z-index: 5;
    width: 34px; height: 34px; border-radius: 50%; border: 1px solid var(--border);
    background: var(--surface); color: var(--fg); cursor: pointer; font-size: 16px;
  }
  .car-scroll-bottom[data-state="hidden"] { display: none; }
  /* BUG 1 — the composer input row is centered to the chat column; the
     full-width band (border + surface) is supplied by .car-composer-wrap. */
  .car-composer {
    display: flex; gap: 8px; align-items: flex-end; width: 100%; max-width: var(--chat-col); margin: 0 auto;
    padding: 10px 12px; border-top: 1px solid var(--border); background: var(--surface);

  .car-input {
    flex: 1 1 auto; resize: none; max-height: 160px;
    background: var(--bg); color: var(--fg); border: 1px solid var(--border);

  }
  .car-input:focus { border-color: var(--accent); }
  .car-send {
    flex: 0 0 auto; background: var(--user-bubble); color: var(--user-fg);
    border: 0; border-radius: 12px; padding: 10px 16px; font: inherit; font-weight: 600; cursor: pointer;
  }
  .car-send:disabled { opacity: .5; cursor: default; }
  .car-cancel { background: var(--cancel-bg); }
  /* Phase 3 — attachment compose affordance + render. */
  .car-attach-img { max-width: 100%; border-radius: 12px; display: block; margin-top: 6px; }
  .car-attach-loading, .car-attach-error { display: inline-block; margin-top: 6px; font-size: 12px; color: var(--muted); }
  .car-composer-wrap { border-top: 1px solid var(--border); background: var(--surface); }
  .car-composer-wrap .car-composer { border-top: 0; }
  /* BUG 1 — staged-attachment chips align to the centered composer column. */
  .car-attach-chips { display: flex; flex-wrap: wrap; gap: 6px; padding: 8px 12px 0; width: 100%; max-width: var(--chat-col); margin: 0 auto; }
  .car-attach-chip {
    display: inline-flex; align-items: center; gap: 2px; max-width: 240px;
    font-size: 12px; padding: 4px 6px 4px 10px; border-radius: 12px;

  .car-attach-chip-error { border-color: var(--error-fg); color: var(--error-fg); }
  .car-attach-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .car-attach-state { color: var(--muted); }
  .car-attach-remove {

    line-height: 1; padding: 0 2px; opacity: .7;
  }
  .car-attach-remove:hover { opacity: 1; }
  .car-attach-btn {
    flex: 0 0 auto; background: transparent; border: 1px solid var(--border);
    border-radius: 12px; color: var(--fg); cursor: pointer; font-size: 16px;
    padding: 8px 10px; line-height: 1;

  .car-attach-btn:hover { border-color: var(--accent); }
  .car-fatal { margin: 40px auto; max-width: 480px; text-align: center; color: var(--error-fg); padding: 20px; }
  /* SEV1 chat-rail stability — recoverable fallback when the chat thread throws
     during render (assistant-ui index lookup on a project switch). Replaces the
     dead black screen with a centered card + Retry / Back to General / Reload. */
  .car-error-boundary {
    margin: auto; max-width: 460px; text-align: center; padding: 32px 24px;
    display: flex; flex-direction: column; gap: 10px; align-items: center;
  }
  .car-error-title { font-size: 18px; font-weight: 600; color: var(--fg); }
  .car-error-sub { font-size: 14px; color: var(--muted); line-height: 1.5; }
  .car-error-actions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 6px; }
  .car-error-btn {
    appearance: none; cursor: pointer; font: inherit; font-size: 13px;
    border: 1px solid var(--border); background: var(--surface); color: var(--fg);
    border-radius: 8px; padding: 7px 14px;
  }
  .car-error-btn:hover { border-color: var(--accent); }
  .car-error-btn-primary { background: var(--accent); color: var(--on-accent); border-color: var(--accent); font-weight: 600; }
  /* ── Admin / Integrations tab ── */
  .cint { display: flex; flex: 1 1 auto; min-height: 0; width: 100%; }
  .cint-scroll { flex: 1 1 auto; min-height: 0; overflow-y: auto; padding: 14px 18px; width: 100%; max-width: 760px; margin: 0 auto; }
  .cint-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 14px; }
  .cint-title { font-size: 18px; font-weight: 600; color: var(--fg); }
  .cint-section { margin-bottom: 22px; }
  .cint-section-title { font-size: 12px; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin: 0 0 8px; font-weight: 600; }
  .cint-list { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 8px; }
  .cint-row {
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; background: var(--surface);
  }
  .cint-row-key { flex-direction: column; align-items: stretch; }
  .cint-row-main { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  .cint-row-label { font-size: 14px; color: var(--fg); font-weight: 600; }
  .cint-required { font-size: 11px; color: var(--accent); font-weight: 500; }
  .cint-row-sub { font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cint-row-scopes { font-size: 11px; color: var(--muted); }
  .cint-badge {
    flex: 0 0 auto; font-size: 11px; color: var(--muted); border: 1px solid var(--border);
    border-radius: 999px; padding: 2px 10px; white-space: nowrap; align-self: flex-start;
  }
  .cint-badge-on { color: var(--on-accent); background: var(--accent); border-color: var(--accent); font-weight: 600; }
  .cint-key-actions { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; align-items: center; }
  .cint-key-input {
    flex: 1 1 200px; min-width: 0; background: var(--bg); color: var(--fg);
    border: 1px solid var(--border); border-radius: 8px; padding: 7px 10px; font: inherit; font-size: 13px;
  }
  /* ── Settings tab (cset-) — per-project credentials, rename, collaborators.
     Stacked sections in a single scroll region; reuses --accent / --border. ── */
  .cset { flex: 1 1 auto; min-height: 0; overflow-y: auto; width: 100%; padding: 18px 20px; }
  .cset-section {
    max-width: 620px; margin: 0 auto 26px; padding-bottom: 22px;
    border-bottom: 1px solid var(--border);
  }
  .cset-section:last-child { border-bottom: 0; margin-bottom: 0; }
  .cset-h { font-size: 16px; font-weight: 700; color: var(--fg); margin: 0 0 4px; }
  .cset-sub { font-size: 13px; color: var(--muted); margin: 0 0 12px; line-height: 1.4; }
  .cset-error { color: var(--error-fg); font-size: 12px; padding: 6px 0; }
  .cset-empty { color: var(--muted); font-size: 13px; padding: 16px 0; text-align: center; }
  .cset-cred-ul { list-style: none; margin: 0 0 14px; padding: 0; display: flex; flex-direction: column; gap: 4px; }
  .cset-cred-row {
    display: flex; align-items: center; gap: 8px; min-height: 34px;
    padding: 4px 10px; border-radius: 8px; background: var(--surface); border: 1px solid var(--border);
  }
  .cset-cred-service { flex: 0 0 auto; font-weight: 600; font-size: 14px; color: var(--fg); }
  .cset-cred-label { flex: 1 1 auto; min-width: 0; font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cset-cred-badge {
    flex: 0 0 auto; margin-left: auto; font-size: 11px; color: var(--muted);
    border: 1px solid var(--border); border-radius: 999px; padding: 1px 9px; white-space: nowrap;
  }
  .cset-cred-row .cset-btn-icon { margin-left: auto; }
  .cset-cred-badge + .cset-btn-icon { margin-left: 0; }
  .cset-cred-form { display: flex; flex-direction: column; gap: 12px; }
  .cset-field { display: flex; flex-direction: column; gap: 5px; border: 0; padding: 0; margin: 0; }
  .cset-label { font-size: 12px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .04em; padding: 0; }
  .cset-optional { text-transform: none; letter-spacing: 0; font-weight: 400; }
  .cset-input {
    background: var(--bg); color: var(--fg); border: 1px solid var(--border);
    border-radius: 8px; padding: 7px 10px; font: inherit; font-size: 14px; min-width: 0;
  }
  .cset-input:disabled { opacity: .5; cursor: default; }
  .cset-input-emoji { max-width: 80px; text-align: center; }
  .cset-scope { flex-direction: row; align-items: center; gap: 16px; flex-wrap: wrap; }
  .cset-radio { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; color: var(--fg); cursor: pointer; }
  .cset-inline { display: flex; gap: 8px; align-items: center; }
  .cset-inline .cset-input { flex: 1 1 auto; }
  .cset-note { font-size: 12px; color: var(--muted); }
  .cset-form-actions { display: flex; justify-content: flex-start; }
  .cset-btn {
    background: transparent; color: var(--fg); border: 1px solid var(--border);
    border-radius: 8px; padding: 7px 14px; font: inherit; font-size: 13px; cursor: pointer;
  }
  .cset-btn:hover:not(:disabled) { border-color: var(--accent); }
  .cset-btn:disabled { opacity: .45; cursor: default; }
  .cset-btn-icon { padding: 3px 8px; line-height: 1; font-size: 11px; }
  .cset-btn-primary { background: var(--accent); color: var(--on-accent); border-color: var(--accent); font-weight: 600; }
  .cset-btn-danger { color: #c0392b; border-color: #c0392b; font-weight: 600; }
  .cset-btn-danger:hover:not(:disabled) { background: #c0392b; color: #fff; border-color: #c0392b; }
  .cset-archive { border-top: 1px solid var(--border); padding-top: 12px; margin-top: 4px; }
  .cint-row-archived .cint-row-label { font-weight: 500; }
  .cset-people-ul { list-style: none; margin: 0 0 12px; padding: 0; display: flex; flex-direction: column; gap: 4px; }
  .cset-person {
    display: flex; align-items: center; gap: 8px; padding: 6px 10px;
    border-radius: 8px; background: var(--surface); border: 1px solid var(--border);
  }
  .cset-person-name { flex: 1 1 auto; font-size: 14px; color: var(--fg); }
  .cset-person-role {
    flex: 0 0 auto; font-size: 11px; color: var(--muted);
    border: 1px solid var(--border); border-radius: 999px; padding: 1px 9px;
  }
</style>
</head>
<body>
<div id="root"></div>
<script>
  // Mirror chat.html: scrub the start_token from the URL BEFORE loading the
  // bundle so the same-origin Referer on /chat-react.js does not leak it, and
  // the browser history does not retain it. Stash on window for the bundle to
  // read (chat-react/config.ts → resolveBootstrapConfig). Best-effort.
  (function () {
    try {
      var params = new URLSearchParams(window.location.search);
      var token = params.get('start');
      if (params.get('debug') === '1') { window.__neutron_debug = true; }
      if (token) {
        window.__neutron_start_token = token;
        // Scrub to the bare path — the start token is stashed on window, and the
        // legacy `?client=react` flag is dead (the vanilla client was removed
        // 2026-06-26; nothing reads the param, and there is no client-selection
        // branch left on the server). Leaving it appended just littered the URL.
        var clean = window.location.pathname;
        window.history.replaceState(null, '', clean);
      }
    } catch (e) { /* sandboxed — config.ts falls back to location.search */ }
  })();
</script>
<script type="module" src="/chat-react.js"></script>
</body>
