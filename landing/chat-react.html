<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Neutron — chat</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
<link rel="manifest" href="/site.webmanifest" />
<meta name="apple-mobile-web-app-title" content="Neutron" />
<meta name="theme-color" content="#0b0d10" />
<style>
  :root {
    --bg: #0b0d10;
    --surface: #16181d;
    --border: #1d2026;
    --fg: #e9eaee;
    --muted: #8a8f99;
    --accent: #6cf;
    --user-bubble: #0a84ff;
    --user-fg: #ffffff;
    --agent-bubble: #1d2026;
    --agent-fg: #e9eaee;
    --agent-avatar-bg: #2b3037;
    --bubble-radius: 18px;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  #root { height: 100dvh; }
  /* WAVE 3 PR-4 — web project tab shell wrapping the chat client. */
  .car-projectshell { display: flex; flex-direction: column; height: 100dvh; min-height: 0; }
  .car-tabs {
    display: flex; gap: 2px; flex: 0 0 auto; overflow-x: auto;
    padding: 0 8px; background: var(--surface); border-bottom: 1px solid var(--border);
  }
  .car-tab {
    appearance: none; background: transparent; color: var(--muted); border: 0;
    border-bottom: 2px solid transparent; padding: 11px 14px; margin: 0;
    font: inherit; font-weight: 600; cursor: pointer; white-space: nowrap;
  }
  .car-tab:hover { color: var(--fg); }
  .car-tab-active { color: var(--fg); border-bottom-color: var(--accent); }
  .car-tabpanels { flex: 1 1 auto; position: relative; min-height: 0; display: flex; }
  .car-tabpanel { flex: 1 1 auto; min-height: 0; min-width: 0; display: flex; }
  .car-tabpanel[hidden] { display: none; }
  .car-tab-frame { flex: 1 1 auto; width: 100%; height: 100%; border: 0; background: var(--bg); }
  .car-tab-placeholder {
    margin: auto; text-align: center; color: var(--muted); padding: 40px 20px;
  }
  .car-tab-placeholder-title { font-size: 20px; color: var(--fg); margin-bottom: 6px; }
  .car-tab-placeholder-sub { font-size: 14px; }
  /* WAVE 3 PR-5 — web Documents tab (list · viewer · comments). */
  .cdoc { display: flex; flex: 1 1 auto; min-height: 0; width: 100%; }
  .cdoc-list {
    flex: 0 0 220px; min-width: 0; overflow-y: auto;
    border-right: 1px solid var(--border); background: var(--surface); padding: 8px 0;
  }
  .cdoc-list-ul { list-style: none; margin: 0; padding: 0; }
  .cdoc-list-item {
    display: flex; flex-direction: column; gap: 1px; width: 100%; text-align: left;
    appearance: none; background: transparent; border: 0; color: var(--fg);
    padding: 7px 12px; font: inherit; cursor: pointer;
  }
  .cdoc-list-item:hover { background: rgba(255,255,255,.05); }
  .cdoc-list-item-active { background: rgba(108,170,255,.16); }
  .cdoc-list-name { font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cdoc-list-dir { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cdoc-view { flex: 1 1 auto; min-width: 0; display: flex; flex-direction: column; min-height: 0; }
  .cdoc-view-head {
    flex: 0 0 auto; display: flex; align-items: center; justify-content: space-between;
    gap: 8px; padding: 8px 14px; border-bottom: 1px solid var(--border);
  }
  .cdoc-view-path { font-size: 13px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cdoc-comment-btn {
    appearance: none; border: 1px solid var(--border); background: var(--surface); color: var(--fg);
    border-radius: 8px; padding: 5px 12px; font: inherit; font-size: 13px; cursor: pointer; flex: 0 0 auto;
  }
  .cdoc-comment-btn:disabled { opacity: .45; cursor: default; }
  .cdoc-edit-actions { display: flex; gap: 6px; align-items: center; flex: 0 0 auto; }
  .cdoc-edit-btn {
    appearance: none; border: 1px solid var(--border); background: var(--surface); color: var(--fg);
    border-radius: 8px; padding: 5px 12px; font: inherit; font-size: 13px; cursor: pointer; flex: 0 0 auto;
  }
  .cdoc-content {
    flex: 1 1 auto; overflow-y: auto; margin: 0; padding: 16px 18px;
    white-space: pre-wrap; word-break: break-word; font: 13px/1.6 ui-monospace, SFMono-Regular, Menlo, monospace;
    color: var(--fg); user-select: text;
  }
  .cdoc-editor {
    flex: 1 1 auto; min-height: 0; overflow-y: auto; margin: 0; padding: 16px 18px; resize: none;
    white-space: pre; word-break: normal; font: 13px/1.6 ui-monospace, SFMono-Regular, Menlo, monospace;
    color: var(--fg); background: var(--bg); border: 0; border-bottom: 1px solid var(--border); outline: none;
  }
  .cdoc-comments {
    flex: 0 0 300px; min-width: 0; overflow-y: auto;
    border-left: 1px solid var(--border); background: var(--surface); padding: 10px;
  }
  .cdoc-empty { color: var(--muted); font-size: 13px; padding: 14px; text-align: center; }
  .cdoc-view-empty { margin: auto; }
  .cdoc-comments-error { color: #ff8a8a; font-size: 12px; padding: 6px 8px; }
  .cdoc-composer, .cdoc-reply-box {
    flex: 0 0 auto; border-top: 1px solid var(--border); padding: 10px 14px; background: var(--surface);
  }
  .cdoc-composer-excerpt { font-size: 12px; color: var(--muted); margin-bottom: 6px; font-style: italic; }
  .cdoc-composer-input {
    width: 100%; resize: vertical; background: var(--bg); color: var(--fg);
    border: 1px solid var(--border); border-radius: 8px; padding: 8px; font: inherit; font-size: 13px;
  }
  .cdoc-composer-actions { display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; }
  .cdoc-btn {
    appearance: none; border: 1px solid var(--border); background: transparent; color: var(--fg);
    border-radius: 8px; padding: 5px 11px; font: inherit; font-size: 12px; cursor: pointer;
  }
  .cdoc-btn:disabled { opacity: .45; cursor: default; }
  .cdoc-btn-primary { background: var(--accent); color: #04121f; border-color: var(--accent); font-weight: 600; }
  .cdoc-thread { border: 1px solid var(--border); border-radius: 10px; margin-bottom: 8px; overflow: hidden; }
  .cdoc-thread-resolved { opacity: .6; }
  .cdoc-thread-head {
    display: block; width: 100%; text-align: left; appearance: none; background: transparent;
    border: 0; color: var(--fg); padding: 9px 11px; font: inherit; cursor: pointer;
  }
  .cdoc-thread-head:hover { background: rgba(255,255,255,.04); }
  .cdoc-thread-anchor { font-size: 11px; color: var(--accent); margin-bottom: 4px; font-style: italic; }
  .cdoc-thread-root { display: flex; flex-direction: column; gap: 2px; }
  .cdoc-thread-author { font-size: 12px; font-weight: 600; color: var(--muted); }
  .cdoc-thread-body { font-size: 13px; color: var(--fg); white-space: pre-wrap; word-break: break-word; }
  .cdoc-thread-count { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .cdoc-thread-detail { padding: 6px 11px 11px; border-top: 1px solid var(--border); }
  .cdoc-reply { display: flex; flex-direction: column; gap: 1px; padding: 6px 0; }
  .cdoc-reply-box { border-top: 0; padding: 6px 0 0; background: transparent; }
  .cdoc-resolved-head { font-size: 11px; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin: 10px 0 6px; padding: 0 4px; }
  @media (max-width: 720px) {
    .cdoc-list { flex-basis: 140px; }
    .cdoc-comments { flex-basis: 200px; }
  }
  /* ── Tasks tab (WAVE 3 PR-8) ── */
  .ctask { display: flex; flex-direction: column; flex: 1 1 auto; min-height: 0; width: 100%; }
  .ctask-head {
    display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
    padding: 10px 14px; border-bottom: 1px solid var(--border); background: var(--surface);
  }
  .ctask-filters { display: flex; gap: 4px; }
  .ctask-filter {
    background: transparent; color: var(--muted); border: 1px solid var(--border);
    border-radius: 999px; padding: 4px 12px; font-size: 12px; cursor: pointer;
  }
  .ctask-filter:hover { color: var(--fg); }
  .ctask-filter-active { color: var(--fg); border-color: var(--accent); background: rgba(108,170,255,.12); }
  .ctask-add { display: flex; gap: 6px; flex: 1 1 240px; min-width: 200px; }
  .ctask-add-input {
    flex: 1 1 auto; min-width: 0; background: var(--bg); color: var(--fg);
    border: 1px solid var(--border); border-radius: 8px; padding: 6px 10px; font-size: 14px;
  }
  .ctask-error { color: #ff8a8a; font-size: 12px; padding: 6px 14px; }
  .ctask-list { flex: 1 1 auto; min-height: 0; overflow-y: auto; padding: 8px 14px; }
  .ctask-empty { color: var(--muted); font-size: 13px; padding: 24px 14px; text-align: center; }
  .ctask-ul { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 6px; }
  .ctask-row {
    display: flex; align-items: flex-start; gap: 10px;
    border: 1px solid var(--border); border-radius: 10px; padding: 8px 10px; background: var(--surface);
  }
  .ctask-row-done { opacity: .55; }
  .ctask-rank { flex: 0 0 34px; font-size: 13px; font-weight: 600; color: var(--accent); padding-top: 2px; text-align: right; }
  .ctask-main { flex: 1 1 auto; min-width: 0; display: flex; flex-direction: column; gap: 3px; }
  .ctask-title-line { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .ctask-title { font-size: 14px; color: var(--fg); word-break: break-word; }
  .ctask-row-done .ctask-title { text-decoration: line-through; }
  .ctask-chip { font-size: 10px; padding: 1px 6px; border-radius: 999px; border: 1px solid var(--border); color: var(--muted); white-space: nowrap; }
  .ctask-chip-prio { color: #ffd27d; border-color: rgba(255,210,125,.4); }
  .ctask-chip-due { color: var(--accent); border-color: rgba(108,170,255,.4); }
  .ctask-reason { font-size: 12px; color: var(--muted); font-style: italic; }
  .ctask-actions { display: flex; gap: 4px; align-items: center; flex-shrink: 0; flex-wrap: wrap; }
  .ctask-btn {
    background: transparent; color: var(--fg); border: 1px solid var(--border);
    border-radius: 8px; padding: 4px 10px; font-size: 12px; cursor: pointer;
  }
  .ctask-btn:hover { border-color: var(--accent); }
  .ctask-btn:disabled { opacity: .4; cursor: default; }
  .ctask-btn-icon { padding: 4px 7px; line-height: 1; font-size: 10px; }
  .ctask-btn-primary { background: var(--accent); color: #04121f; border-color: var(--accent); font-weight: 600; }
  .car-shell { display: flex; height: 100%; width: 100%; }
  .car-rail {
    width: 220px;
    flex: 0 0 220px;
    border-right: 1px solid var(--border);
    background: var(--surface);
    padding: 12px 8px;
    overflow-y: auto;
  }
  .car-rail-title { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .06em; padding: 4px 8px 8px; }
  .car-rail-item {
    display: block; width: 100%; text-align: left;
    background: transparent; color: var(--fg); border: 0; border-radius: 8px;
    padding: 8px 10px; margin: 2px 0; cursor: pointer; font: inherit;
  }
  .car-rail-item:hover { background: rgba(255,255,255,.05); }
  .car-rail-item-active { background: rgba(108,170,255,.16); color: #cfe6ff; }
  @media (max-width: 720px) { .car-rail { display: none; } }
  .car-main { flex: 1 1 auto; display: flex; flex-direction: column; min-width: 0; }
  .car-banner {
    text-align: center; font-size: 13px; padding: 6px 12px;
    background: #2a2410; color: #ffd479; border-bottom: 1px solid var(--border);
  }
  .car-banner-connecting, .car-banner-reconnecting { background: #18222e; color: #8cc6ff; }
  .car-banner-closed { background: #2a1416; color: #ff8a8a; }
  .car-thread { position: relative; flex: 1 1 auto; display: flex; flex-direction: column; min-height: 0; }
  .car-viewport { flex: 1 1 auto; overflow-y: auto; padding: 18px 16px 8px; display: flex; flex-direction: column; gap: 10px; }
  .car-empty { margin: auto; text-align: center; color: var(--muted); }
  .car-empty-title { font-size: 22px; color: var(--fg); margin-bottom: 6px; }
  .car-row { display: flex; gap: 8px; align-items: flex-end; max-width: 100%; }
  .car-row-user { justify-content: flex-end; }
  .car-row-agent { justify-content: flex-start; }
  .car-avatar {
    flex: 0 0 28px; width: 28px; height: 28px; border-radius: 50%;
    background: var(--agent-avatar-bg); color: var(--fg);
    display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600;
  }
  /* BUG 2 — tight bubbles matching the old vanilla chat: a ~60ch readable cap,
     a 4ch floor so a one-word reply doesn't collapse to a sliver, and snug
     8px/13px padding. */
  .car-bubble {
    max-width: min(60ch, 80%);
    min-width: 4ch;
    padding: 8px 13px; border-radius: var(--bubble-radius);
    white-space: pre-wrap; word-wrap: break-word; overflow-wrap: anywhere;
  }
  .car-bubble-user { background: var(--user-bubble); color: var(--user-fg); border-bottom-right-radius: 4px; }
  .car-bubble-agent { background: var(--agent-bubble); color: var(--agent-fg); border-bottom-left-radius: 4px; }
  .car-bubble img { max-width: 100%; border-radius: 12px; display: block; margin-top: 6px; }
  .car-typing { display: inline-flex; gap: 4px; align-items: center; }
  .car-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); animation: car-blink 1.4s infinite both; }
  .car-dot:nth-child(2) { animation-delay: .2s; }
  .car-dot:nth-child(3) { animation-delay: .4s; }
  @keyframes car-blink { 0%, 80%, 100% { opacity: .25; } 40% { opacity: 1; } }
  .car-pending { text-align: center; font-size: 12px; color: var(--muted); padding: 4px; }
  /* Track B Phase 4 — delivery/read receipt status line for the latest send. */
  .car-receipt { text-align: right; font-size: 11px; color: var(--muted); padding: 2px 14px; }
  .car-receipt-read { color: var(--accent); }
  /* Track B Phase 4 — per-message emoji reaction chips.
     BUG 5 (iMessage-style) — the resting bubble is CLEAN: existing reaction
     chips stay visible, but the "＋" add affordance is hidden until the row is
     hovered/focused (desktop) so there's no persistent "+" on every bubble.
     The container carries no top margin of its own (it's empty at rest when a
     message has no reactions); the chips supply their own spacing. */
  .car-reactions { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 0; align-items: center; }
  .car-reaction {
    font-size: 12px; line-height: 1; margin-top: 6px; padding: 3px 8px; border-radius: 11px;
    border: 1px solid var(--border); background: var(--surface, rgba(255,255,255,0.04));
    color: inherit; cursor: pointer;
  }
  .car-reaction-self { border-color: var(--accent); color: var(--accent); }
  .car-reaction-add { display: none; opacity: 0.6; padding: 3px 7px; }
  .car-reaction-add:hover { opacity: 1; }
  .car-row:hover .car-reaction-add,
  .car-row:focus-within .car-reaction-add { display: inline-block; }
  .car-reaction-picker { display: inline-flex; gap: 2px; margin-left: 2px; margin-top: 6px; }
  .car-reaction-pick { font-size: 15px; background: none; border: none; cursor: pointer; padding: 1px 3px; }
  /* P1b — onboarding / quick-reply button rows + image gallery. */
  .car-choices { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .car-choice {
    font: inherit; font-size: 13px; line-height: 1.2; font-weight: 500; text-align: left;
    padding: 7px 12px; border-radius: 10px; cursor: pointer;
    border: 1px solid var(--border); background: var(--surface, rgba(255,255,255,0.04)); color: inherit;
  }
  .car-choice:hover { border-color: var(--accent); }
  .car-choice-primary { background: var(--accent); color: var(--user-fg, #04121f); border-color: var(--accent); font-weight: 600; }
  .car-choice-destructive { background: transparent; border-color: var(--danger, #e5534b); color: var(--danger, #e5534b); }
  .car-choices-chosen { margin-top: 8px; font-size: 13px; color: var(--muted); }
  .car-gallery-wrap { margin-top: 8px; }
  .car-gallery { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .car-gallery-tile {
    position: relative; display: block; padding: 0; overflow: hidden; cursor: pointer;
    border-radius: 10px; border: 1px solid var(--border); background: var(--surface, rgba(255,255,255,0.04));
  }
  .car-gallery-tile:hover { border-color: var(--accent); }
  .car-gallery-img { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; }
  .car-gallery-label {
    position: absolute; left: 0; right: 0; bottom: 0; padding: 4px 8px; text-align: left;
    font-size: 12px; font-weight: 600; color: #fff; background: rgba(10,10,10,0.7);
  }
  .car-upload-hint {
    font-size: 12px; color: var(--muted); padding: 6px 14px;
    border-top: 1px solid var(--border); background: var(--surface);
  }
  /* BUG 4 — history-import upload status, shown above the composer while a
     ChatGPT/Claude export ZIP uploads + after it lands. */
  .car-import-status {
    font-size: 12px; padding: 6px 12px; margin: 6px 12px 0; border-radius: 8px;
    border: 1px solid var(--border); background: var(--bg); color: var(--muted);
  }
  .car-import-uploading { color: #8cc6ff; border-color: rgba(140,198,255,.4); }
  .car-import-done { color: #7ddf9b; border-color: rgba(125,223,155,.4); }
  .car-import-error { color: #ff8a8a; border-color: rgba(255,138,138,.4); }
  /* BUG 1 — fresh-onboarding auto-start loader (matches the old chat's
     "Setting things up…"). The typing dots sit inline before the label. */
  .car-empty-loading { display: inline-flex; align-items: center; gap: 8px; }
  /* Track B Phase 4 — message edit/delete: edited marker, actions, inline editor. */
  .car-edited { font-size: 11px; opacity: 0.55; margin-top: 2px; display: inline-block; }
  /* BUG 5 — Edit/Delete are NOT always-on text under every bubble. Hidden at
     rest; revealed on hover/focus of the row (desktop), like iMessage's
     secondary actions. */
  .car-msg-actions { display: none; gap: 8px; margin-top: 4px; }
  .car-row:hover .car-msg-actions,
  .car-row:focus-within .car-msg-actions { display: flex; }
  .car-msg-action {
    font-size: 11px; background: none; border: none; cursor: pointer;
    color: var(--muted, #888); padding: 0; opacity: 0.7;
  }
  .car-msg-action:hover { opacity: 1; text-decoration: underline; }
  .car-msg-action-danger:hover { color: var(--danger, #e5534b); }
  .car-edit { display: flex; flex-direction: column; gap: 6px; margin-top: 4px; }
  .car-edit-input {
    width: 100%; min-height: 48px; resize: vertical; font: inherit;
    border-radius: 8px; border: 1px solid var(--border); background: var(--surface, rgba(255,255,255,0.04));
    color: inherit; padding: 6px 8px;
  }
  .car-edit-actions { display: flex; gap: 6px; justify-content: flex-end; }
  .car-edit-btn {
    font-size: 12px; padding: 3px 10px; border-radius: 8px; cursor: pointer;
    border: 1px solid var(--border); background: var(--surface, rgba(255,255,255,0.04)); color: inherit;
  }
  .car-edit-save { border-color: var(--accent); color: var(--accent); }
  .car-scroll-bottom {
    position: absolute; right: 16px; bottom: 78px; z-index: 5;
    width: 34px; height: 34px; border-radius: 50%; border: 1px solid var(--border);
    background: var(--surface); color: var(--fg); cursor: pointer; font-size: 16px;
  }
  .car-scroll-bottom[data-state="hidden"] { display: none; }
  .car-composer {
    display: flex; gap: 8px; align-items: flex-end;
    padding: 10px 12px; border-top: 1px solid var(--border); background: var(--surface);
  }
  .car-input {
    flex: 1 1 auto; resize: none; max-height: 160px;
    background: var(--bg); color: var(--fg); border: 1px solid var(--border);
    border-radius: 12px; padding: 10px 12px; font: inherit; outline: none;
  }
  .car-input:focus { border-color: var(--accent); }
  .car-send {
    flex: 0 0 auto; background: var(--user-bubble); color: var(--user-fg);
    border: 0; border-radius: 12px; padding: 10px 16px; font: inherit; font-weight: 600; cursor: pointer;
  }
  .car-send:disabled { opacity: .5; cursor: default; }
  .car-cancel { background: #3a3f47; }
  /* Phase 3 — attachment compose affordance + render. */
  .car-attach-img { max-width: 100%; border-radius: 12px; display: block; margin-top: 6px; }
  .car-attach-loading, .car-attach-error { display: inline-block; margin-top: 6px; font-size: 12px; color: var(--muted); }
  .car-composer-wrap { border-top: 1px solid var(--border); background: var(--surface); }
  .car-composer-wrap.car-dragover { outline: 2px dashed var(--accent); outline-offset: -4px; }
  .car-composer-wrap .car-composer { border-top: 0; }
  .car-attach-chips { display: flex; flex-wrap: wrap; gap: 6px; padding: 8px 12px 0; }
  .car-attach-chip {
    display: inline-flex; align-items: center; gap: 2px; max-width: 240px;
    font-size: 12px; padding: 4px 6px 4px 10px; border-radius: 12px;
    border: 1px solid var(--border); background: var(--bg); color: var(--fg);
  }
  .car-attach-chip-error { border-color: #ff8a8a; color: #ff8a8a; }
  .car-attach-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .car-attach-state { color: var(--muted); }
  .car-attach-remove {
    background: none; border: 0; color: inherit; cursor: pointer; font-size: 15px;
    line-height: 1; padding: 0 2px; opacity: .7;
  }
  .car-attach-remove:hover { opacity: 1; }
  .car-attach-btn {

<body>
<div id="root"></div>
<script>
  // Mirror chat.html: scrub the start_token from the URL BEFORE loading the
  // bundle so the same-origin Referer on /chat-react.js does not leak it, and
  // the browser history does not retain it. Stash on window for the bundle to
  // read (chat-react/config.ts → resolveBootstrapConfig). Best-effort.
  (function () {
    try {
      var params = new URLSearchParams(window.location.search);
      var token = params.get('start');
      if (params.get('debug') === '1') { window.__neutron_debug = true; }
      if (token) {
        window.__neutron_start_token = token;
        // Preserve the client flag across the scrub so a refresh stays on React.
        var clean = window.location.pathname + '?client=react';
        window.history.replaceState(null, '', clean);
      }
    } catch (e) { /* sandboxed — config.ts falls back to location.search */ }
  })();
</script>
<script type="module" src="/chat-react.js"></script>
</body>
