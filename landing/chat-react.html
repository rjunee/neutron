<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Neutron — chat</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
<link rel="manifest" href="/site.webmanifest" />
<meta name="apple-mobile-web-app-title" content="Neutron" />
<meta name="theme-color" content="#0b0d10" />
<script>
  // Pre-paint theme resolution — sets data-theme on <html> BEFORE the stylesheet
  // below paints, so a user who prefers/last-chose light never sees a dark flash
  // (FOUC). This is a tiny, dependency-free MIRROR of the resolution in
  // landing/chat-react/theme.ts (which can't be imported inline); React's
  // useTheme hook re-applies + owns the attribute after mount. Same key
  // ('neutron-theme') and same rule: explicit 'light'/'dark' wins; anything else
  // ('system' / absent / corrupt) follows prefers-color-scheme.
  (function () {
    try {
      var pref = null;
      try { pref = window.localStorage.getItem('neutron-theme'); } catch (e) {}
      if (pref !== 'light' && pref !== 'dark') pref = 'system';
      var systemLight = false;
      try { systemLight = window.matchMedia('(prefers-color-scheme: light)').matches; } catch (e) {}
      var resolved = pref === 'light' ? 'light' : pref === 'dark' ? 'dark' : (systemLight ? 'light' : 'dark');
      document.documentElement.setAttribute('data-theme', resolved);
      var meta = document.querySelector('meta[name="theme-color"]');
      if (meta) meta.setAttribute('content', resolved === 'light' ? '#f5f5f7' : '#0b0d10');
    } catch (e) { /* leave data-theme unset → :root dark defaults apply */ }
  })();
</script>
<style>
  /* ─────────────────────────────────────────────────────────────────────────
     THEME (light/dark) — Ryan-requested 2026-07-01.
     The stylesheet is ENTIRELY CSS-variable-driven: `:root` holds the DARK
     palette (the historical default + the fallback when no data-theme is set),
     and `:root[data-theme="light"]` overrides the SAME vars with an
     iMessage-on-iPhone light palette. Every color below resolves through a var,
     so there are NO dark-only leftovers — flipping `data-theme` reskins the whole
     UI with ONE stylesheet (no dual code paths). The effective theme
     (`data-theme="light"|"dark"`) is resolved from the persisted preference +
     `prefers-color-scheme` by the pre-paint inline script in <head> and the
     React `useTheme` hook (landing/chat-react/theme.ts).
     ───────────────────────────────────────────────────────────────────────── */
  :root {
    /* Core surfaces + text */
    --bg: #0b0d10;
    --surface: #16181d;
    --border: #1d2026;
    --fg: #e9eaee;
    --muted: #8a8f99;
    --accent: #6cf;
    /* Text/icon drawn ON an accent-filled surface (primary buttons, badges). */
    --on-accent: #04121f;
    /* Chat bubbles */
    --user-bubble: #0a84ff;
    --user-fg: #ffffff;
    --agent-bubble: #1d2026;
    --agent-fg: #e9eaee;
    --agent-avatar-bg: #2b3037;
    --bubble-radius: 18px;
    /* Hover / active / accent tints (rail, lists, rows, filters, flash). */
    --hover-bg: rgba(255,255,255,.05);
    --hover-bg-weak: rgba(255,255,255,.04);
    --active-bg: rgba(108,170,255,.16);
    --active-fg: #cfe6ff;
    --accent-tint: rgba(108,170,255,.12);
    --accent-tint-weak: rgba(108,170,255,.10);
    --accent-flash: rgba(108,170,255,.18);
    --accent-border: rgba(108,170,255,.4);
    /* Code (inline + block) */
    --code-bg: rgba(255,255,255,.08);
    --code-block-bg: #0c0e12;
    /* Status: danger/error, warn, info, success */
    --danger: #e5534b;
    --error-fg: #ff8a8a;
    --error-border: rgba(255,138,138,.4);
    --warn-fg: #ffd27d;
    --warn-border: rgba(255,210,125,.4);
    --info-fg: #8cc6ff;
    --info-border: rgba(140,198,255,.4);
    --info-track: rgba(140,198,255,.18);
    --info-ring: rgba(140,198,255,.3);
    --success-fg: #7ddf9b;
    --success-border: rgba(125,223,155,.4);
    /* Connection banners */
    --banner-warn-bg: #2a2410;   --banner-warn-fg: #ffd479;
    --banner-info-bg: #18222e;   --banner-info-fg: #8cc6ff;
    --banner-error-bg: #2a1416;  --banner-error-fg: #ff8a8a;
    /* Overlays (drag-and-drop scrim/frame, image gallery label) */
    --scrim: rgba(10,10,10,0.62);
    --dropzone-frame-bg: rgba(18,18,18,0.92);
    --gallery-label-bg: rgba(10,10,10,0.7);
    --gallery-label-fg: #fff;
    /* Misc controls */
    --cancel-bg: #3a3f47;
    /* BUG 1 — centered, constrained chat column width (mirrors .cint-scroll's
       760px); applied to message rows + composer + status lines so the chat is
       a centered column on wide screens, full-width (margins collapse) on mobile. */
    --chat-col: 760px;
  }
  /* LIGHT — iMessage-on-iPhone palette: white chat surface, the #007AFF iMessage
     blue for the user bubble, ~#E9E9EB grey agent bubbles with near-black text,
     subtle iOS separators. Same vars, so every surface reskins. */
  :root[data-theme="light"] {
    --bg: #ffffff;
    --surface: #f5f5f7;
    --border: #d1d1d6;
    --fg: #1c1c1e;
    --muted: #8a8a8e;
    --accent: #007aff;
    --on-accent: #ffffff;
    --user-bubble: #007aff;
    --user-fg: #ffffff;
    --agent-bubble: #e9e9eb;
    --agent-fg: #1c1c1e;
    --agent-avatar-bg: #d1d1d6;
    --hover-bg: rgba(0,0,0,.05);
    --hover-bg-weak: rgba(0,0,0,.035);
    --active-bg: rgba(0,122,255,.12);
    --active-fg: #0b57d0;
    --accent-tint: rgba(0,122,255,.10);
    --accent-tint-weak: rgba(0,122,255,.07);
    --accent-flash: rgba(0,122,255,.14);
    --accent-border: rgba(0,122,255,.4);
    --code-bg: rgba(0,0,0,.06);
    --code-block-bg: #f5f5f7;
    --danger: #d70015;
    --error-fg: #c9252d;
    --error-border: rgba(201,37,45,.4);
    --warn-fg: #9a6a00;
    --warn-border: rgba(154,106,0,.35);
    --info-fg: #0b57d0;
    --info-border: rgba(11,87,208,.35);
    --info-track: rgba(11,87,208,.14);
    --info-ring: rgba(11,87,208,.25);
    --success-fg: #1a7f37;
    --success-border: rgba(26,127,55,.35);
    --banner-warn-bg: #fff4d6;   --banner-warn-fg: #7a5b00;
    --banner-info-bg: #e6f0ff;   --banner-info-fg: #0b57d0;
    --banner-error-bg: #ffe5e5;  --banner-error-fg: #c9252d;
    --scrim: rgba(0,0,0,0.35);
    --dropzone-frame-bg: #ffffff;
    --gallery-label-bg: rgba(0,0,0,0.55);
    --gallery-label-fg: #fff;
    --cancel-bg: #d1d1d6;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  #root { height: 100dvh; }
  /* Web app shell (rail/tab rework 2026-06-30): persistent project rail (left)
     + content column (tab bar over the active tab body). */
  .car-app { display: flex; height: 100dvh; min-height: 0; width: 100%; }
  .car-content { flex: 1 1 auto; display: flex; flex-direction: column; min-width: 0; min-height: 0; }
  /* Top bar row: the section tab bar fills the row; the theme toggle is pinned
     to the far right. The band's surface + bottom border live here so the tabs
     and the toggle share one seamless strip. */
  .car-topbar {
    display: flex; align-items: stretch; flex: 0 0 auto;
    background: var(--surface); border-bottom: 1px solid var(--border);
  }
  .car-tabs {
    display: flex; gap: 2px; flex: 1 1 auto; min-width: 0; overflow-x: auto;
    padding: 0 8px;
  }
  .car-tab {
    appearance: none; background: transparent; color: var(--muted); border: 0;
    border-bottom: 2px solid transparent; padding: 11px 14px; margin: 0;
    font: inherit; font-weight: 600; cursor: pointer; white-space: nowrap;
  }
  .car-tab:hover { color: var(--fg); }
  .car-tab-active { color: var(--fg); border-bottom-color: var(--accent); }
  /* Light/dark theme toggle — pinned top-right of the content pane. A single
     pill button that cycles system → light → dark; the glyph shows the resolved
     theme (☀/☾) with a small "Auto" marker while following the system. */
  .car-theme-toggle {
    flex: 0 0 auto; align-self: center; margin: 0 10px 0 6px;
    display: inline-flex; align-items: center; gap: 6px;
    appearance: none; cursor: pointer; font: inherit; font-size: 13px; line-height: 1;
    color: var(--muted); background: transparent;
    border: 1px solid var(--border); border-radius: 999px; padding: 5px 10px;
    transition: color .12s, border-color .12s, background .12s;
  }
  .car-theme-toggle:hover { color: var(--fg); border-color: var(--accent); }
  .car-theme-toggle:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .car-theme-glyph { font-size: 15px; line-height: 1; }
  .car-theme-auto { font-size: 11px; text-transform: uppercase; letter-spacing: .04em; }
  .car-tabpanels { flex: 1 1 auto; position: relative; min-height: 0; display: flex; }
  .car-tabpanel { flex: 1 1 auto; min-height: 0; min-width: 0; display: flex; }
  .car-tabpanel[hidden] { display: none; }
  .car-tab-frame { flex: 1 1 auto; width: 100%; height: 100%; border: 0; background: var(--bg); }
  .car-tab-placeholder {
    margin: auto; text-align: center; color: var(--muted); padding: 40px 20px;
  }
  .car-tab-placeholder-title { font-size: 20px; color: var(--fg); margin-bottom: 6px; }
  .car-tab-placeholder-sub { font-size: 14px; }
  /* Sanitized markdown (react-markdown + remark-gfm) — shared by agent chat
     bubbles + the Documents viewer. Dark theme; tight vertical rhythm so a chat
     bubble doesn't balloon. */
  .car-md { color: inherit; overflow-wrap: anywhere; }
  .car-md > :first-child { margin-top: 0; }
  .car-md > :last-child { margin-bottom: 0; }
  .car-md p { margin: 0 0 8px; line-height: 1.4; }
  .car-md h1, .car-md h2, .car-md h3, .car-md h4 { margin: 14px 0 6px; line-height: 1.25; font-weight: 700; }
  .car-md h1 { font-size: 1.4em; } .car-md h2 { font-size: 1.25em; } .car-md h3 { font-size: 1.1em; }
  .car-md ul, .car-md ol { margin: 0 0 8px; padding-left: 22px; }
  .car-md li { margin: 2px 0; }
  .car-md li > input[type="checkbox"] { margin-right: 6px; }
  .car-md a { color: var(--accent); text-decoration: underline; }
  .car-md strong { font-weight: 700; }
  .car-md em { font-style: italic; }
  .car-md code {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: .9em;
    background: var(--code-bg); border-radius: 4px; padding: 1px 5px;
  }
  .car-md pre {
    background: var(--code-block-bg); border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 12px; overflow-x: auto; margin: 0 0 8px;
  }
  .car-md pre code { background: none; padding: 0; font-size: .85em; }
  .car-md blockquote {
    margin: 0 0 8px; padding: 2px 0 2px 12px; border-left: 3px solid var(--border); color: var(--muted);
  }
  .car-md table { border-collapse: collapse; margin: 0 0 8px; display: block; overflow-x: auto; }
  .car-md th, .car-md td { border: 1px solid var(--border); padding: 4px 8px; text-align: left; }
  .car-md th { background: var(--hover-bg-weak); font-weight: 700; }
  .car-md hr { border: 0; border-top: 1px solid var(--border); margin: 12px 0; }
  .car-md img { max-width: 100%; border-radius: 6px; }
  /* Documents viewer markdown: scrollable, roomier line-height than chat. */
  .cdoc-md { flex: 1 1 auto; min-height: 0; overflow: auto; padding: 16px 20px; }
  .cdoc-md p, .cdoc-md li { line-height: 1.6; }
  /* WAVE 3 PR-5 — web Documents tab (list · viewer · comments). */
  .cdoc { display: flex; flex: 1 1 auto; min-height: 0; width: 100%; }
  .cdoc-list {
    flex: 0 0 220px; min-width: 0; overflow-y: auto;
    border-right: 1px solid var(--border); background: var(--surface); padding: 8px 0;
  }
  .cdoc-list-ul { list-style: none; margin: 0; padding: 0; }
  .cdoc-list-item {
    display: flex; flex-direction: column; gap: 1px; width: 100%; text-align: left;
    appearance: none; background: transparent; border: 0; color: var(--fg);
    padding: 7px 12px; font: inherit; cursor: pointer;
  }
  .cdoc-list-item:hover { background: var(--hover-bg); }
  .cdoc-list-item-active { background: var(--active-bg); }
  .cdoc-list-name { font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cdoc-list-dir { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cdoc-view { flex: 1 1 auto; min-width: 0; display: flex; flex-direction: column; min-height: 0; }
  .cdoc-view-head {
    flex: 0 0 auto; display: flex; align-items: center; justify-content: space-between;
    gap: 8px; padding: 8px 14px; border-bottom: 1px solid var(--border);
  }
  .cdoc-view-path { font-size: 13px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cdoc-comment-btn {
    appearance: none; border: 1px solid var(--border); background: var(--surface); color: var(--fg);
    border-radius: 8px; padding: 5px 12px; font: inherit; font-size: 13px; cursor: pointer; flex: 0 0 auto;
  }
  .cdoc-comment-btn:disabled { opacity: .45; cursor: default; }
  .cdoc-edit-actions { display: flex; gap: 6px; align-items: center; flex: 0 0 auto; }
  .cdoc-edit-btn, .cdoc-view-toggle {
    appearance: none; border: 1px solid var(--border); background: var(--surface); color: var(--fg);
    border-radius: 8px; padding: 5px 12px; font: inherit; font-size: 13px; cursor: pointer; flex: 0 0 auto;
  }
  .cdoc-view-toggle[aria-pressed="true"] { border-color: var(--accent); color: var(--accent); }
  .cdoc-content {
    flex: 1 1 auto; overflow-y: auto; margin: 0; padding: 16px 18px;
    white-space: pre-wrap; word-break: break-word; font: 13px/1.6 ui-monospace, SFMono-Regular, Menlo, monospace;
    color: var(--fg); user-select: text;
  }
  .cdoc-editor {
    flex: 1 1 auto; min-height: 0; overflow-y: auto; margin: 0; padding: 16px 18px; resize: none;
    white-space: pre; word-break: normal; font: 13px/1.6 ui-monospace, SFMono-Regular, Menlo, monospace;
    color: var(--fg); background: var(--bg); border: 0; border-bottom: 1px solid var(--border); outline: none;
  }
  .cdoc-comments {
    flex: 0 0 300px; min-width: 0; overflow-y: auto;
    border-left: 1px solid var(--border); background: var(--surface); padding: 10px;
  }
  .cdoc-empty { color: var(--muted); font-size: 13px; padding: 14px; text-align: center; }
  .cdoc-view-empty { margin: auto; }
  .cdoc-comments-error { color: var(--error-fg); font-size: 12px; padding: 6px 8px; }
  .cdoc-composer, .cdoc-reply-box {
    flex: 0 0 auto; border-top: 1px solid var(--border); padding: 10px 14px; background: var(--surface);
  }
  .cdoc-composer-excerpt { font-size: 12px; color: var(--muted); margin-bottom: 6px; font-style: italic; }
  .cdoc-composer-input {
    width: 100%; resize: vertical; background: var(--bg); color: var(--fg);
    border: 1px solid var(--border); border-radius: 8px; padding: 8px; font: inherit; font-size: 13px;
  }
  .cdoc-composer-actions { display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; }
  .cdoc-btn {
    appearance: none; border: 1px solid var(--border); background: transparent; color: var(--fg);
    border-radius: 8px; padding: 5px 11px; font: inherit; font-size: 12px; cursor: pointer;
  }
  .cdoc-btn:disabled { opacity: .45; cursor: default; }
  .cdoc-btn-primary { background: var(--accent); color: var(--on-accent); border-color: var(--accent); font-weight: 600; }
  .cdoc-thread { border: 1px solid var(--border); border-radius: 10px; margin-bottom: 8px; overflow: hidden; }
  .cdoc-thread-resolved { opacity: .6; }
  .cdoc-thread-head {
    display: block; width: 100%; text-align: left; appearance: none; background: transparent;
    border: 0; color: var(--fg); padding: 9px 11px; font: inherit; cursor: pointer;
  }
  .cdoc-thread-head:hover { background: var(--hover-bg-weak); }
  .cdoc-thread-anchor { font-size: 11px; color: var(--accent); margin-bottom: 4px; font-style: italic; }
  .cdoc-thread-root { display: flex; flex-direction: column; gap: 2px; }
  .cdoc-thread-author { font-size: 12px; font-weight: 600; color: var(--muted); }
  .cdoc-thread-body { font-size: 13px; color: var(--fg); white-space: pre-wrap; word-break: break-word; }
  .cdoc-thread-count { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .cdoc-thread-detail { padding: 6px 11px 11px; border-top: 1px solid var(--border); }
  .cdoc-reply { display: flex; flex-direction: column; gap: 1px; padding: 6px 0; }
  .cdoc-reply-box { border-top: 0; padding: 6px 0 0; background: transparent; }
  .cdoc-resolved-head { font-size: 11px; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin: 10px 0 6px; padding: 0 4px; }
  @media (max-width: 720px) {
    .cdoc-list { flex-basis: 140px; }
    .cdoc-comments { flex-basis: 200px; }
  }
  /* ── Tasks tab (WAVE 3 PR-8) ── */
  .ctask { display: flex; flex-direction: column; flex: 1 1 auto; min-height: 0; width: 100%; }
  .ctask-head {
    display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
    padding: 10px 14px; border-bottom: 1px solid var(--border); background: var(--surface);
  }
  .ctask-filters { display: flex; gap: 4px; }
  .ctask-filter {
    background: transparent; color: var(--muted); border: 1px solid var(--border);
    border-radius: 999px; padding: 4px 12px; font-size: 12px; cursor: pointer;
  }
  .ctask-filter:hover { color: var(--fg); }
  .ctask-filter-active { color: var(--fg); border-color: var(--accent); background: var(--accent-tint); }
  .ctask-add { display: flex; gap: 6px; flex: 1 1 240px; min-width: 200px; }
  .ctask-add-input {
    flex: 1 1 auto; min-width: 0; background: var(--bg); color: var(--fg);
    border: 1px solid var(--border); border-radius: 8px; padding: 6px 10px; font-size: 14px;
  }
  .ctask-error { color: var(--error-fg); font-size: 12px; padding: 6px 14px; }
  .ctask-list { flex: 1 1 auto; min-height: 0; overflow-y: auto; padding: 8px 14px; }
  .ctask-empty { color: var(--muted); font-size: 13px; padding: 24px 14px; text-align: center; }
  .ctask-ul { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 6px; }
  .ctask-row {
    display: flex; align-items: flex-start; gap: 10px;
    border: 1px solid var(--border); border-radius: 10px; padding: 8px 10px; background: var(--surface);
  }
  .ctask-row-done { opacity: .55; }
  .ctask-rank { flex: 0 0 34px; font-size: 13px; font-weight: 600; color: var(--accent); padding-top: 2px; text-align: right; }
  .ctask-main { flex: 1 1 auto; min-width: 0; display: flex; flex-direction: column; gap: 3px; }
  .ctask-title-line { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .ctask-title { font-size: 14px; color: var(--fg); word-break: break-word; }
  .ctask-row-done .ctask-title { text-decoration: line-through; }
  .ctask-chip { font-size: 10px; padding: 1px 6px; border-radius: 999px; border: 1px solid var(--border); color: var(--muted); white-space: nowrap; }
  .ctask-chip-prio { color: var(--warn-fg); border-color: var(--warn-border); }
  .ctask-chip-due { color: var(--accent); border-color: var(--accent-border); }
  .ctask-reason { font-size: 12px; color: var(--muted); font-style: italic; }
  .ctask-actions { display: flex; gap: 4px; align-items: center; flex-shrink: 0; flex-wrap: wrap; }
  .ctask-btn {
    background: transparent; color: var(--fg); border: 1px solid var(--border);
    border-radius: 8px; padding: 4px 10px; font-size: 12px; cursor: pointer;
  }
  .ctask-btn:hover { border-color: var(--accent); }
  .ctask-btn:disabled { opacity: .4; cursor: default; }
  .ctask-btn-icon { padding: 4px 7px; line-height: 1; font-size: 10px; }
  .ctask-btn-primary { background: var(--accent); color: var(--on-accent); border-color: var(--accent); font-weight: 600; }
  /* ── Work Board tab (cwb-) — flat one-line rows, NOT cards (distinct from
     ctask). Reuses --accent (#6cf live-blue), --muted, --border, car-blink. ── */
  .cwb { display: flex; flex-direction: column; flex: 1 1 auto; min-height: 0; width: 100%; }
  .cwb-head {
    display: flex; gap: 12px; align-items: center;
    padding: 10px 14px; border-bottom: 1px solid var(--border); background: var(--surface);
  }
  .cwb-add { display: flex; gap: 6px; flex: 1 1 auto; min-width: 0; }
  .cwb-add-input {
    flex: 1 1 auto; min-width: 0; background: var(--bg); color: var(--fg);
    border: 1px solid var(--border); border-radius: 8px; padding: 6px 10px; font-size: 14px;
  }
  .cwb-error { color: var(--error-fg); font-size: 12px; padding: 6px 14px; }
  .cwb-list { flex: 1 1 auto; min-height: 0; overflow-y: auto; padding: 6px 8px; }
  .cwb-empty { color: var(--muted); font-size: 13px; padding: 24px 14px; text-align: center; }
  .cwb-empty-zero { padding: 40px 24px; }
  .cwb-ul { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; }
  .cwb-row {
    display: flex; align-items: center; gap: 8px;
    min-height: 34px; padding: 3px 8px; border-radius: 8px;
  }
  .cwb-row:hover { background: var(--hover-bg); }
  /* status dot — fixed-width leftmost column; a clickable button that advances. */
  .cwb-dot {
    flex: 0 0 auto; width: 9px; height: 9px; border-radius: 50%; padding: 0;
    border: 1.5px solid var(--muted); background: transparent; cursor: pointer;
  }
  .cwb-dot:disabled { cursor: default; }
  .cwb-dot-upcoming { border-color: var(--muted); background: transparent; }
  .cwb-dot-active { border-color: var(--accent); background: var(--accent); animation: car-blink 1.4s infinite both; }
  .cwb-dot-done { border-color: var(--muted); background: var(--muted); opacity: .6; }
  /* activity glyph — fork (sub-agent) vs caret (inline); live-blue, by silhouette. */
  .cwb-activity { flex: 0 0 auto; color: var(--accent); font-size: 13px; line-height: 1; width: 12px; text-align: center; }
  .cwb-title {
    flex: 1 1 auto; min-width: 0; font-size: 14px; color: var(--fg);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .cwb-title-btn { background: transparent; border: 0; text-align: left; cursor: text; font: inherit; padding: 2px 0; }
  .cwb-edit-input {
    flex: 1 1 auto; min-width: 0; background: var(--bg); color: var(--fg);
    border: 1px solid var(--accent); border-radius: 6px; padding: 3px 8px; font-size: 14px;
  }
  .cwb-date { flex: 0 0 auto; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 11px; color: var(--muted); }
  .cwb-actions { flex: 0 0 auto; display: flex; gap: 2px; align-items: center; opacity: 0; transition: opacity .12s; }
  .cwb-row:hover .cwb-actions, .cwb-row:focus-within .cwb-actions { opacity: 1; }
  .cwb-btn {
    background: transparent; color: var(--fg); border: 1px solid var(--border);
    border-radius: 6px; padding: 3px 8px; font-size: 12px; cursor: pointer;
  }
  .cwb-btn:hover { border-color: var(--accent); }
  .cwb-btn:disabled { opacity: .35; cursor: default; }
  .cwb-btn-icon { padding: 2px 6px; line-height: 1; font-size: 10px; }
  .cwb-btn-primary { background: var(--accent); color: var(--on-accent); border-color: var(--accent); font-weight: 600; }
  .cwb-row-done { opacity: .55; }
  .cwb-row-done .cwb-title { text-decoration: line-through; }
  /* completed disclosure — collapsed at the bottom, its own scroll region. */
  .cwb-completed { margin-top: 8px; border-top: 1px solid var(--border); padding-top: 6px; }
  .cwb-completed-toggle {
    display: flex; align-items: center; gap: 6px; width: 100%;
    background: transparent; color: var(--muted); border: 0; cursor: pointer;
    font-size: 12px; text-transform: uppercase; letter-spacing: .05em; padding: 6px 8px;
  }
  .cwb-completed-toggle:hover { color: var(--fg); }
  .cwb-completed-caret { display: inline-block; width: 10px; }
  .cwb-completed-ul { max-height: 40vh; overflow-y: auto; }
  /* one-shot flash when a row's snapshot changes; reduced-motion turns it off. */
  @keyframes cwb-flash { from { background: var(--accent-flash); } to { background: transparent; } }
  @media (prefers-reduced-motion: reduce) {
    .cwb-dot-active { animation: none; }
    .cwb-flash { animation: none; }
  }
  /* ── Project rail (rail-redesign) ──────────────────────────────────────────
     A cleaner, more tactile left column: emoji "avatar" chips give every row a
     visual anchor (like app icons), the label sits in a medium weight, an
     accent-lit pill marks the active project, and a Telegram-style count pill
     shows unread activity. A row with unread activity reads bolder to draw the
     eye. Entirely theme-var-driven, so it reskins with the #153 light/dark
     toggle with zero hardcoded colours. */
  .car-rail {
    width: 244px;
    flex: 0 0 244px;
    border-right: 1px solid var(--border);
    background: var(--surface);
    padding: 14px 10px 10px;
    overflow-y: auto;
    /* Flex column so the Create Project button pins to the bottom (margin-top:auto). */
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .car-rail-title {
    color: var(--muted); font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: .09em; padding: 2px 10px 8px;
  }
  .car-rail-list { display: flex; flex-direction: column; gap: 2px; }
  .car-rail-item {
    display: flex; align-items: center; gap: 10px;
    width: 100%; text-align: left;
    background: transparent; color: var(--fg); border: 0; border-radius: 11px;
    padding: 7px 9px; cursor: pointer; font: inherit; font-size: 14px;
    transition: background .14s ease, color .14s ease, transform .06s ease;
  }
  .car-rail-item:hover { background: var(--hover-bg); }
  .car-rail-item:active { transform: scale(.985); }
  .car-rail-item:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }
  /* Emoji "avatar" chip — a soft rounded square that anchors each row. */
  .car-rail-emoji {
    flex: 0 0 30px; width: 30px; height: 30px;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 17px; line-height: 1;
    background: var(--bg); border: 1px solid var(--border); border-radius: 9px;
    transition: border-color .14s ease, background .14s ease;
  }
  .car-rail-label {
    flex: 1 1 auto; min-width: 0;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  /* Active row: accent-tinted fill, brighter label, and the emoji chip lifts to
     the accent tint so the selection reads as one cohesive object. */
  .car-rail-item-active { background: var(--active-bg); color: var(--active-fg); font-weight: 600; }
  .car-rail-item-active .car-rail-emoji { border-color: var(--accent-border); background: var(--accent-tint-weak); }
  /* Unread (and not active) — bolder, full-contrast label, Telegram-style. */
  .car-rail-item-unread .car-rail-label { color: var(--fg); font-weight: 600; }
  /* Unread count pill, right-aligned. */
  .car-rail-badge {
    flex: 0 0 auto; margin-left: auto;
    min-width: 20px; height: 20px; padding: 0 6px; box-sizing: border-box;
    display: inline-flex; align-items: center; justify-content: center;
    background: var(--accent); color: var(--on-accent);
    font-size: 11px; font-weight: 700; line-height: 1; border-radius: 999px;
  }
  /* Pinned to the bottom of the rail (margin-top:auto pushes it down). */
  .car-rail-create {
    margin-top: auto; width: 100%; text-align: left;
    background: transparent; color: var(--accent); border: 1px dashed var(--border);
    border-radius: 10px; padding: 9px 11px; cursor: pointer; font: inherit; font-size: 14px;
    transition: background .14s ease, border-color .14s ease;
  }
  .car-rail-create:hover:not(:disabled) { background: var(--accent-tint-weak); border-color: var(--accent); }
  .car-rail-create:disabled { opacity: .6; cursor: default; }
  /* Inline create-project form (replaces the native window.prompt). Pinned to
     the bottom like the closed button (margin-top:auto). */
  .car-rail-create-form { margin-top: auto; display: flex; flex-direction: column; gap: 6px; }
  .car-rail-input {
    width: 100%; box-sizing: border-box; font: inherit;
    background: var(--bg); color: var(--fg);
    border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; outline: none;
  }
  .car-rail-input:focus { border-color: var(--accent); }
  .car-rail-create-error { color: var(--error-fg); font-size: 12px; padding: 0 2px; }
  .car-rail-create-actions { display: flex; gap: 6px; justify-content: flex-end; }
  .car-rail-create-cancel, .car-rail-create-confirm {
    font-size: 12px; padding: 4px 10px; border-radius: 8px; cursor: pointer; font: inherit;
    border: 1px solid var(--border); background: var(--surface, rgba(255,255,255,0.04)); color: inherit;
  }
  .car-rail-create-confirm { border-color: var(--accent); color: var(--accent); }
  .car-rail-create-cancel:disabled, .car-rail-create-confirm:disabled { opacity: .6; cursor: default; }
  /* The rail is the sole project navigation (persistent left column), so keep it
     visible on narrow screens — just slimmer — rather than hiding it. The emoji
     chip stays; the label ellipsises. */
  @media (max-width: 720px) { .car-rail { width: 208px; flex-basis: 208px; padding: 12px 8px; } }
  /* position: relative anchors the full-surface drag-and-drop overlay (BUG 2+4). */
  .car-main { position: relative; flex: 1 1 auto; display: flex; flex-direction: column; min-width: 0; }
  /* Subtle drag feedback for a PLAIN image drag (no import affordance) — the
     import drag gets the prominent .car-dropzone overlay instead (Codex r1). */
  .car-main.car-dragover { outline: 2px dashed var(--accent); outline-offset: -4px; }
  .car-banner {
    text-align: center; font-size: 13px; padding: 6px 12px;
    background: var(--banner-warn-bg); color: var(--banner-warn-fg); border-bottom: 1px solid var(--border);
  }
  .car-banner-connecting, .car-banner-reconnecting { background: var(--banner-info-bg); color: var(--banner-info-fg); }
  .car-banner-closed { background: var(--banner-error-bg); color: var(--banner-error-fg); }
  .car-thread { position: relative; flex: 1 1 auto; display: flex; flex-direction: column; min-height: 0; }
  .car-viewport { flex: 1 1 auto; overflow-y: auto; padding: 18px 16px 8px; display: flex; flex-direction: column; gap: 10px; }
  .car-empty { margin: auto; text-align: center; color: var(--muted); }
  .car-empty-title { font-size: 22px; color: var(--fg); margin-bottom: 6px; }
  /* BUG 1 — each row is a centered, column-width flex container: the user bubble
     right-aligns within it, the agent bubble left-aligns, and the whole column
     sits centered on wide screens (width:100% collapses the auto margins on mobile). */
  .car-row { display: flex; gap: 8px; align-items: flex-end; width: 100%; max-width: var(--chat-col); margin-left: auto; margin-right: auto; }
  .car-row-user { justify-content: flex-end; }
  .car-row-agent { justify-content: flex-start; }
  .car-avatar {
    flex: 0 0 28px; width: 28px; height: 28px; border-radius: 50%;
    background: var(--agent-avatar-bg); color: var(--fg);
    display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600;
  }
  /* BUG 2 — tight bubbles matching the old vanilla chat: a ~60ch readable cap,
     a 4ch floor so a one-word reply doesn't collapse to a sliver, and snug
     8px/13px padding. */
  .car-bubble {
    max-width: min(60ch, 80%);
    min-width: 4ch;
    padding: 5px 13px; border-radius: var(--bubble-radius);
    white-space: pre-wrap; word-wrap: break-word; overflow-wrap: anywhere;
  }
  .car-bubble-user { background: var(--user-bubble); color: var(--user-fg); border-bottom-right-radius: 4px; }
  .car-bubble-agent { background: var(--agent-bubble); color: var(--agent-fg); border-bottom-left-radius: 4px; }
  .car-bubble img { max-width: 100%; border-radius: 12px; display: block; margin-top: 6px; }
  .car-typing { display: inline-flex; gap: 4px; align-items: center; }
  .car-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); animation: car-blink 1.4s infinite both; }
  .car-dot:nth-child(2) { animation-delay: .2s; }
  .car-dot:nth-child(3) { animation-delay: .4s; }
  @keyframes car-blink { 0%, 80%, 100% { opacity: .25; } 40% { opacity: 1; } }
  /* BUG 1 — keep the queued/receipt status lines aligned to the centered column. */
  .car-pending { text-align: center; font-size: 12px; color: var(--muted); padding: 4px; max-width: var(--chat-col); margin: 0 auto; }
  /* Track B Phase 4 — delivery/read receipt status line for the latest send. */
  .car-receipt { text-align: right; font-size: 11px; color: var(--muted); padding: 2px 14px; max-width: var(--chat-col); margin: 0 auto; }
  .car-receipt-read { color: var(--accent); }
  /* Track B Phase 4 — per-message emoji reaction chips.
     BUG 5 (2026-06-29) — Ryan doesn't want reactions: the "＋" add trigger +
     emoji picker are no longer rendered, so a message with no reactions shows no
     reaction UI at all. Only existing chips (e.g. an agent-set reaction) render;
     the add-affordance + picker styles were removed with the markup. */
  .car-reactions { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 0; align-items: center; }
  .car-reaction {
    font-size: 12px; line-height: 1; margin-top: 6px; padding: 3px 8px; border-radius: 11px;
    border: 1px solid var(--border); background: var(--surface, rgba(255,255,255,0.04));
    color: inherit; cursor: pointer;
  }
  .car-reaction-self { border-color: var(--accent); color: var(--accent); }
  /* P1b — onboarding / quick-reply button rows + image gallery. */
  .car-choices { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .car-choice {
    font: inherit; font-size: 13px; line-height: 1.2; font-weight: 500; text-align: left;
    padding: 7px 12px; border-radius: 10px; cursor: pointer;
    border: 1px solid var(--border); background: var(--surface, rgba(255,255,255,0.04)); color: inherit;
  }
  .car-choice:hover { border-color: var(--accent); }
  .car-choice-primary { background: var(--accent); color: var(--user-fg, #04121f); border-color: var(--accent); font-weight: 600; }
  .car-choice-destructive { background: transparent; border-color: var(--danger, #e5534b); color: var(--danger, #e5534b); }
  .car-choices-chosen { margin-top: 8px; font-size: 13px; color: var(--muted); }
  .car-gallery-wrap { margin-top: 8px; }
  .car-gallery { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .car-gallery-tile {
    position: relative; display: block; padding: 0; overflow: hidden; cursor: pointer;
    border-radius: 10px; border: 1px solid var(--border); background: var(--surface, rgba(255,255,255,0.04));
  }
  .car-gallery-tile:hover { border-color: var(--accent); }
  .car-gallery-img { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; }
  .car-gallery-label {
    position: absolute; left: 0; right: 0; bottom: 0; padding: 4px 8px; text-align: left;
    font-size: 12px; font-weight: 600; color: var(--gallery-label-fg); background: var(--gallery-label-bg);
  }
  /* BUG 3/4 — history-import status above the composer: the one-shot upload
     banner AND the live `import_progress` indicator (spinner + body + bar).
     Centered to the chat column (BUG 1). */
  .car-import-status {
    font-size: 12px; padding: 8px 12px; margin: 6px auto 0; max-width: var(--chat-col); border-radius: 8px;
    border: 1px solid var(--border); background: var(--bg); color: var(--muted);
    display: flex; flex-direction: column; gap: 6px;
  }
  .car-import-uploading { color: var(--info-fg); border-color: var(--info-border); }
  .car-import-done { color: var(--success-fg); border-color: var(--success-border); }
  .car-import-error { color: var(--error-fg); border-color: var(--error-border); }
  /* BUG 3 — live progress: spinner + body line + a thin determinate bar. */
  .car-import-row { display: flex; align-items: center; gap: 8px; }
  .car-import-body { flex: 1 1 auto; min-width: 0; }
  .car-spinner {
    flex: 0 0 auto; width: 13px; height: 13px; border-radius: 50%;
    border: 2px solid var(--info-ring); border-top-color: var(--info-fg);
    animation: car-spin 0.8s linear infinite;
  }
  @keyframes car-spin { to { transform: rotate(360deg); } }
  .car-import-bar { display: block; height: 4px; border-radius: 999px; background: var(--info-track); overflow: hidden; }
  .car-import-bar-fill { display: block; height: 100%; background: var(--info-fg); border-radius: 999px; transition: width .4s ease; }
  /* BUG 2+4 — the prominent drag-and-drop overlay (web counterpart of
     app/components/DropZoneOverlay.tsx). Full-surface tinted scrim + dashed frame,
     shown only while dragging a file with an active import affordance. */
  .car-dropzone {
    position: absolute; inset: 0; z-index: 40; display: flex; align-items: center; justify-content: center;
    padding: 24px; background: var(--scrim); animation: car-fade .12s ease;
  }
  @keyframes car-fade { from { opacity: 0; } to { opacity: 1; } }
  .car-dropzone-frame {
    width: 100%; max-width: 480px; border-radius: 14px; border: 2px dashed var(--accent);
    background: var(--dropzone-frame-bg); padding: 28px 24px; text-align: center;
    display: flex; flex-direction: column; gap: 8px;
  }
  .car-dropzone-title { font-size: 18px; font-weight: 600; color: var(--fg); }
  .car-dropzone-hint { font-size: 13px; color: var(--muted); }
  /* BUG 1 — fresh-onboarding auto-start loader (matches the old chat's
     "Setting things up…"). The typing dots sit inline before the label. */
  .car-empty-loading { display: inline-flex; align-items: center; gap: 8px; }
  /* Track B Phase 4 — message edit/delete: edited marker, actions, inline editor. */
  .car-edited { font-size: 11px; opacity: 0.55; margin-top: 2px; display: inline-block; }
  /* BUG 5 — Edit/Delete are NOT always-on clutter under every bubble. On
     HOVER-CAPABLE pointer devices (desktop) they're invisible at rest and
     revealed on row hover/focus, like iMessage's secondary actions. We use
     opacity (NOT display:none) so the buttons stay in the tab order and keyboard
     focus both reaches AND reveals them (`:focus-within`). On touch / no-hover
     devices there is no hover to reveal them, so they stay visible — never
     unreachable (a11y, per cross-model review). (The reaction "＋" trigger was
     removed entirely — Ryan doesn't want reactions on web.) */
  .car-msg-actions { display: flex; gap: 8px; margin-top: 4px; }
  @media (hover: hover) and (pointer: fine) {
    .car-msg-actions { opacity: 0; pointer-events: none; transition: opacity 0.12s ease; }
    .car-row:hover .car-msg-actions,
    .car-row:focus-within .car-msg-actions { opacity: 1; pointer-events: auto; }
    .car-msg-action:focus { opacity: 1; }
  }
  .car-msg-action {
    font-size: 11px; background: none; border: none; cursor: pointer;
    color: var(--muted, #888); padding: 0; opacity: 0.7;
  }
  .car-msg-action:hover { opacity: 1; text-decoration: underline; }
  .car-msg-action-danger:hover { color: var(--danger, #e5534b); }
  .car-edit { display: flex; flex-direction: column; gap: 6px; margin-top: 4px; }
  .car-edit-input {
    width: 100%; min-height: 48px; resize: vertical; font: inherit;
    border-radius: 8px; border: 1px solid var(--border); background: var(--surface, rgba(255,255,255,0.04));
    color: inherit; padding: 6px 8px;
  }
  .car-edit-actions { display: flex; gap: 6px; justify-content: flex-end; }
  .car-edit-btn {
    font-size: 12px; padding: 3px 10px; border-radius: 8px; cursor: pointer;
    border: 1px solid var(--border); background: var(--surface, rgba(255,255,255,0.04)); color: inherit;
  }
  .car-edit-save { border-color: var(--accent); color: var(--accent); }
  .car-scroll-bottom {
    position: absolute; right: 16px; bottom: 78px; z-index: 5;
    width: 34px; height: 34px; border-radius: 50%; border: 1px solid var(--border);
    background: var(--surface); color: var(--fg); cursor: pointer; font-size: 16px;
  }
  .car-scroll-bottom[data-state="hidden"] { display: none; }
  /* BUG 1 — the composer input row is centered to the chat column; the
     full-width band (border + surface) is supplied by .car-composer-wrap. */
  .car-composer {
    display: flex; gap: 8px; align-items: flex-end; width: 100%; max-width: var(--chat-col); margin: 0 auto;
    padding: 10px 12px; border-top: 1px solid var(--border); background: var(--surface);
  }
  .car-input {
    flex: 1 1 auto; resize: none; max-height: 160px;
    background: var(--bg); color: var(--fg); border: 1px solid var(--border);
    border-radius: 12px; padding: 10px 12px; font: inherit; outline: none;
  }
  .car-input:focus { border-color: var(--accent); }
  .car-send {
    flex: 0 0 auto; background: var(--user-bubble); color: var(--user-fg);
    border: 0; border-radius: 12px; padding: 10px 16px; font: inherit; font-weight: 600; cursor: pointer;
  }
  .car-send:disabled { opacity: .5; cursor: default; }
  .car-cancel { background: var(--cancel-bg); }
  /* Phase 3 — attachment compose affordance + render. */
  .car-attach-img { max-width: 100%; border-radius: 12px; display: block; margin-top: 6px; }
  .car-attach-loading, .car-attach-error { display: inline-block; margin-top: 6px; font-size: 12px; color: var(--muted); }
  .car-composer-wrap { border-top: 1px solid var(--border); background: var(--surface); }
  .car-composer-wrap .car-composer { border-top: 0; }
  /* BUG 1 — staged-attachment chips align to the centered composer column. */
  .car-attach-chips { display: flex; flex-wrap: wrap; gap: 6px; padding: 8px 12px 0; width: 100%; max-width: var(--chat-col); margin: 0 auto; }
  .car-attach-chip {
    display: inline-flex; align-items: center; gap: 2px; max-width: 240px;
    font-size: 12px; padding: 4px 6px 4px 10px; border-radius: 12px;
    border: 1px solid var(--border); background: var(--bg); color: var(--fg);
  }
  .car-attach-chip-error { border-color: var(--error-fg); color: var(--error-fg); }
  .car-attach-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .car-attach-state { color: var(--muted); }
  .car-attach-remove {
    background: none; border: 0; color: inherit; cursor: pointer; font-size: 15px;
    line-height: 1; padding: 0 2px; opacity: .7;
  }
  .car-attach-remove:hover { opacity: 1; }
  .car-attach-btn {
    flex: 0 0 auto; background: transparent; border: 1px solid var(--border);
    border-radius: 12px; color: var(--fg); cursor: pointer; font-size: 16px;
    padding: 8px 10px; line-height: 1;
  }
  .car-attach-btn:hover { border-color: var(--accent); }
  .car-fatal { margin: 40px auto; max-width: 480px; text-align: center; color: var(--error-fg); padding: 20px; }
  /* ── Admin / Integrations tab ── */
  .cint { display: flex; flex: 1 1 auto; min-height: 0; width: 100%; }
  .cint-scroll { flex: 1 1 auto; min-height: 0; overflow-y: auto; padding: 14px 18px; width: 100%; max-width: 760px; margin: 0 auto; }
  .cint-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 14px; }
  .cint-title { font-size: 18px; font-weight: 600; color: var(--fg); }
  .cint-section { margin-bottom: 22px; }
  .cint-section-title { font-size: 12px; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin: 0 0 8px; font-weight: 600; }
  .cint-list { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 8px; }
  .cint-row {
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; background: var(--surface);
  }
  .cint-row-key { flex-direction: column; align-items: stretch; }
  .cint-row-main { display: flex; flex-direction: column; gap: 2px; min-width: 0; }

  .cset-cred-service { flex: 0 0 auto; font-weight: 600; font-size: 14px; color: var(--fg); }

  }
</style>
</head>
<body>
<div id="root"></div>
<script>
  // Mirror chat.html: scrub the start_token from the URL BEFORE loading the
  // bundle so the same-origin Referer on /chat-react.js does not leak it, and
  // the browser history does not retain it. Stash on window for the bundle to
  // read (chat-react/config.ts → resolveBootstrapConfig). Best-effort.
  (function () {
    try {
      var params = new URLSearchParams(window.location.search);
      var token = params.get('start');
      if (params.get('debug') === '1') { window.__neutron_debug = true; }
      if (token) {
        window.__neutron_start_token = token;
        // Preserve the client flag across the scrub so a refresh stays on React.
        var clean = window.location.pathname + '?client=react';
        window.history.replaceState(null, '', clean);
      }
    } catch (e) { /* sandboxed — config.ts falls back to location.search */ }
  })();
</script>
<script type="module" src="/chat-react.js"></script>
</body>
</html>
